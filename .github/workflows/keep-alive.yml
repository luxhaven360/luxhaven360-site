name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 */6 * * *'  # ogni 6 ore
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 500 ]; then
            echo "✅ Supabase raggiungibile (status $HTTP_STATUS)"
          else
            echo "⚠️ Risposta inattesa (status $HTTP_STATUS) — il progetto potrebbe essere in pausa"
            exit 1
          fi

      - name: Ping Supabase Auth (doppio keepalive)
        continue-on-error: true
        run: |
          curl -s -o /dev/null \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/auth/v1/settings"
          echo "Auth endpoint pingato."
