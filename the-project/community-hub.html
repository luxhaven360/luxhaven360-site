let _pendingMediaFile = null; // { file, url, type } — pronto per l'invio

async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = ''; // reset input per permettere ricaricamento stesso file

  const isImage = file.type.startsWith('image/');
  const isVideo = file.type.startsWith('video/');
  if (!isImage && !isVideo) { showToast('red','⚠️','Formato non supportato. Usa immagini o video.'); return; }

  showToast('blue','⏳', isImage ? 'Compressione immagine…' : 'Preparazione video…');

  try {
    let compressedFile;
    if (isImage) {
      compressedFile = await compressImage(file, 0.10); // comprimi al 10% della dim originale (90% riduzione)
    } else {
      // I video non vengono compressi nel browser — upload diretto
      compressedFile = file;
    }
    _pendingMediaFile = { file: compressedFile, type: file.type };
    showMediaPreview(compressedFile, file.type, file.name);
    showToast('green','✅', isImage ? `Compressa: ${formatBytes(compressedFile.size)}` : `Video pronto: ${formatBytes(compressedFile.size)}`);
  } catch(e) {
    showToast('red','⚠️','Errore nella preparazione del file.');
    console.warn('[Media]', e);
  }
}

/* Comprime immagine con Canvas — qualità target ~10% dimensione originale */
function compressImage(file, targetSizeFraction) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      // Ridimensiona a max 1200px mantenendo aspect ratio
      const MAX_DIM = 1200;
      let { width, height } = img;
      if (width > MAX_DIM || height > MAX_DIM) {
        const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      // Qualità 0.7 con ridimensionamento ottiene tipicamente ~90% riduzione
      canvas.toBlob((blob) => {
        if (!blob) { reject(new Error('Canvas toBlob failed')); return; }
        resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' }));
      }, 'image/jpeg', 0.70);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
    img.src = url;
  });
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function showMediaPreview(file, type, name) {
  const bar = document.getElementById('mediaPreviewBar');
  const thumb = document.getElementById('mediaPreviewThumb');
  const nameEl = document.getElementById('mediaPreviewName');
  if (!bar) return;
  const url = URL.createObjectURL(file);
  if (type.startsWith('image')) {
    thumb.innerHTML = `<img src="${url}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;"/>`;
  } else {
    thumb.innerHTML = `<video src="${url}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;" muted></video>`;
  }
  nameEl.textContent = name || file.name || 'Media';
  bar.classList.add('visible');
}

function removeMediaAttachment() {
  _pendingMediaFile = null;
  const bar = document.getElementById('mediaPreviewBar');
  if (bar) { bar.classList.remove('visible'); document.getElementById('mediaPreviewThumb').innerHTML = ''; }
}

/* ── Assicura sessione Supabase (anon sign-in se necessario) — richiesta dalle RLS storage ── */
async function ensureSupabaseAuth() {
  if (!_sb) return false;
  try {
    const { data: { session } } = await _sb.auth.getSession();
    if (session) return true; // già autenticato
    const { error } = await _sb.auth.signInAnonymously();
    if (error) { console.warn('[Supabase Auth] signInAnonymously error:', error.message); return false; }
    return true;
  } catch(e) {
    console.warn('[Supabase Auth] ensureSupabaseAuth error:', e.message);
    return false;
  }
}

/* Upload file su Supabase Storage → ritorna URL pubblico */
async function uploadMediaToSupabase(file) {
  // Ottieni sessione auth per soddisfare le RLS policy dello storage
  await ensureSupabaseAuth();
  const ext = file.name.split('.').pop() || 'jpg';
  const path = `chat/${currentUser.email.replace(/[@.]/g,'_')}/${Date.now()}.${ext}`;
  const { error } = await _sb.storage.from('chat-media').upload(path, file, { upsert: false, contentType: file.type });
  if (error) throw new Error(error.message);
  const { data } = _sb.storage.from('chat-media').getPublicUrl(path);
  return { url: data.publicUrl, type: file.type };
}
function renderMediaBubble(url, type) {
  if (!url) return '';
  if (type && type.startsWith('video')) {
    return `<div class="msg-media"><video src="${url}" controls preload="metadata" style="max-width:220px;max-height:180px;border-radius:10px;display:block;"></video></div>`;
  }
  // Default: immagine
  return `<div class="msg-media"><img src="${url}" alt="Immagine" style="max-width:220px;max-height:240px;border-radius:10px;display:block;cursor:pointer;" onclick="window.open('${url}','_blank')"/></div>`;
}

/* ── Invia messaggio ── */
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = (input?.value || '').trim();
  const hasMedia = !!_pendingMediaFile;

  if (!text && !hasMedia) return;
  if (!currentUser) { showToast('red', '⚠️', 'Sessione scaduta. Ricarica la pagina.'); return; }
  if (!currentConvPartnerEmail) { showToast('red', '⚠️', 'Nessuna conversazione aperta.'); return; }

  const sendBtn = document.querySelector('.chat-send-btn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.style.opacity = '0.5'; }
  input.value = '';
  clearTypingStatus();

  // Chiudi emoji picker se aperto
  document.getElementById('emojiPickerWrap')?.classList.remove('open');

  // Gestisci upload media
  let mediaUrl = null, mediaType = null;
  if (hasMedia) {
    const mediaFile = _pendingMediaFile;
    removeMediaAttachment();
    try {
      showToast('blue','⏳','Invio media…');
      const result = await uploadMediaToSupabase(mediaFile.file);
      mediaUrl = result.url;
      mediaType = result.type;
    } catch(e) {
      showToast('red','⚠️','Errore upload media: ' + e.message);
      if (sendBtn) { sendBtn.disabled = false; sendBtn.style.opacity = ''; }
      return;
    }
  }

  const partnerInfo = getPartnerInfo(currentConvPartnerEmail);

  // Ottimistic update
  const tempMsg = {
    id: 'temp_' + Date.now(),
    from: currentUser.email,
    fromName: currentUser.name,
    fromInitial: currentUser.initial,
    text,
    media_url: mediaUrl,
    media_type: mediaType,
    ts: new Date().toISOString(),
    deletedFor: []
  };
  appendMessageToChat(tempMsg, true);

  // Aggiorna conv list preview
  let conv = REAL_CONVS.find(c => c.partnerEmail.toLowerCase() === currentConvPartnerEmail.toLowerCase());
  if (!conv) {
    conv = {
      partnerEmail: currentConvPartnerEmail,
      partnerName: partnerInfo.name,
      partnerInitial: partnerInfo.initial,
      partnerRole: partnerInfo.role,
      lastMessage: text,
      lastTs: tempMsg.ts,
      unread: 0
    };
    REAL_CONVS.unshift(conv);
  } else {
    conv.lastMessage = text;
    conv.lastTs = tempMsg.ts;
    REAL_CONVS = [conv, ...REAL_CONVS.filter(c => c.partnerEmail !== conv.partnerEmail)];
  }
  renderConversations();

  // Persisti su Supabase (RT istantaneo) E su GAS (persistenza storica)
  const cid = convId(currentUser.email, currentConvPartnerEmail);

  // ── Supabase: scrivi il messaggio in real-time ──
  if (_sbReady) {
    const now = new Date().toISOString();
    // Inserisci messaggio
    _sb.from('messages').insert({
      conv_id:      cid,
      sender_email: currentUser.email.toLowerCase(),
      sender_name:  currentUser.name,
      text:         text || null,
      media_url:    mediaUrl,
      media_type:   mediaType,
      deleted_for:  []
    }).then(({ error }) => { if (error) console.warn('[SB msg insert]', error.message); });

    // Upsert metadati conversazione per mittente (unread=0)
    _sb.from('conversations').upsert({
      conv_id:         cid,
      user_email:      currentUser.email.toLowerCase(),
      partner_email:   currentConvPartnerEmail.toLowerCase(),
      partner_name:    partnerInfo.name,
      partner_initial: partnerInfo.initial,
      partner_role:    partnerInfo.role || '',
      last_message:    text,
      last_ts:         now,
      unread:          0
    }, { onConflict: 'conv_id,user_email' }).then(({ error }) => { if (error) console.warn('[SB conv upsert]', error.message); });

    // Upsert metadati conversazione per destinatario (unread++)
    _sb.from('conversations')
      .select('unread')
      .eq('conv_id', cid)
      .eq('user_email', currentConvPartnerEmail.toLowerCase())
      .maybeSingle()
      .then(({ data: existing }) => {
        const currentUnread = existing ? (existing.unread || 0) : 0;
        return _sb.from('conversations').upsert({
          conv_id:         cid,
          user_email:      currentConvPartnerEmail.toLowerCase(),
          partner_email:   currentUser.email.toLowerCase(),
          partner_name:    currentUser.name,
          partner_initial: currentUser.initial,
          partner_role:    currentUser.role || '',
          last_message:    text,
          last_ts:         now,
          unread:          currentUnread + 1
        }, { onConflict: 'conv_id,user_email' });
      }).then(({ error } = {}) => { if (error) console.warn('[SB conv partner upsert]', error.message); });
  }

  // ── GAS: persistenza storica (fallback o doppio-salvataggio) ──
  if (!GAS_URL) {
    if (sendBtn) { sendBtn.disabled = false; sendBtn.style.opacity = ''; }
    return;
  }
  try {
    const resp = await fetch(`${GAS_URL}?action=send_message` +
      `&senderEmail=${encodeURIComponent(currentUser.email)}&recipientEmail=${encodeURIComponent(currentConvPartnerEmail)}` +
      `&text=${encodeURIComponent(text)}&senderName=${encodeURIComponent(currentUser.name)}` +
      `&senderInitial=${encodeURIComponent(currentUser.initial)}&senderRole=${encodeURIComponent(currentUser.role||'')}` +
      `&recipientName=${encodeURIComponent(partnerInfo.name)}&recipientInitial=${encodeURIComponent(partnerInfo.initial)}` +
      `&recipientRole=${encodeURIComponent(partnerInfo.role||'')}`);
    const data = await resp.json();
    if (data.success && data.message) {
      _msgLastSeen[currentConvPartnerEmail] = data.message.id;
    } else if (!data.success) {
      console.error('[Messages] GAS error:', data.error);
      showToast('red', '⚠️', 'Errore invio: ' + (data.error || 'sconosciuto'));
    }
  } catch(e) {
    console.error('[Messages] send error:', e.message);
    showToast('red', '⚠️', 'Errore di rete nell\'invio del messaggio.');
  } finally {
    if (sendBtn) { sendBtn.disabled = false; sendBtn.style.opacity = ''; }
  }
}

/* ── Aggiungi singolo messaggio alla chat (senza re-render completo) ── */
function appendMessageToChat(msg, isSent) {
  const messagesEl = document.getElementById('chatMessages');
  if (!messagesEl) return;

  // Rimuovi eventuale empty state
  const emptyState = messagesEl.querySelector('div[style*="text-align:center"]');
  if (emptyState) messagesEl.innerHTML = '';

  const partnerInfo = getPartnerInfo(currentConvPartnerEmail || '');
  const msgTs = new Date(msg.ts).getTime();
  const timeLabel = formatMsgTime(msg.ts);

  // FIX data intelligente: mostra separatore solo se gap > 4 ore dall'ultimo messaggio
  const DATE_GAP_MS = 4 * 60 * 60 * 1000;
  const lastMsgEl = messagesEl.querySelector('.msg:last-of-type');
  const lastTimeStr = lastMsgEl ? lastMsgEl.querySelector('.msg-time')?.textContent : null;
  // Recupera timestamp dell'ultimo messaggio dal data attribute
  const lastMsgTs = parseInt(messagesEl.dataset.lastMsgTs || '0', 10);
  const gap = lastMsgTs > 0 ? msgTs - lastMsgTs : DATE_GAP_MS + 1;
  messagesEl.dataset.lastMsgTs = msgTs;

  if (!lastMsgEl || gap > DATE_GAP_MS) {
    const dateLabel = new Date(msg.ts).toLocaleDateString('it-IT', { weekday:'long', day:'2-digit', month:'long' });
    const divider = document.createElement('div');
    divider.className = 'chat-date-divider';
    divider.innerHTML = `<span>${dateLabel}</span>`;
    messagesEl.appendChild(divider);
  }

  const partnerRole = partnerInfo.role === 'team';
  const el = document.createElement('div');
  el.className = `msg ${isSent ? 'sent' : 'received'}`;
  const avStyle = isSent
    ? 'color:var(--gold);border-color:var(--gold-dim);'
    : (partnerRole ? 'color:var(--gold);border-color:var(--gold-dim);' : '');
  const avInitial = isSent ? currentUser.initial : partnerInfo.initial;
  const mediaHtml = msg.media_url ? renderMediaBubble(msg.media_url, msg.media_type) : '';
  el.innerHTML = `
    ${!isSent ? `<div class="msg-avatar" style="${avStyle}">${avInitial}</div>` : ''}
    <div class="msg-bubble-wrap">
      ${mediaHtml}
      ${msg.text ? `<div class="msg-bubble">${escapeHtml(msg.text)}</div>` : ''}
      <div class="msg-time">${timeLabel}</div>
    </div>
    ${isSent ? `<div class="msg-avatar" style="${avStyle}">${avInitial}</div>` : ''}`;
  messagesEl.appendChild(el);
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

/* ── Polling messaggi: fallback GAS se Supabase non disponibile ── */
function startMessagePolling() {
  stopMessagePolling();
  if (_sbReady && currentConvPartnerEmail) {
    // Supabase già in ascolto — nessun polling necessario
    return;
  }
  // Fallback GAS polling (solo se Supabase non disponibile)
  _msgPollTimer = setInterval(pollMessages, 600);
}
function stopMessagePolling() {
  if (_msgPollTimer) { clearInterval(_msgPollTimer); _msgPollTimer = null; }
}

/* ── Listener Supabase Realtime per i messaggi di una conversazione ── */
function sbListenMessages(partnerEmail) {
  if (!_sbReady || !currentUser || !partnerEmail) return;
  const cid = convId(currentUser.email, partnerEmail);

  // Se la conv è già attiva (stesso partner), non ricaricare — mostra cache istantaneamente
  if (_activeListenPartner && _activeListenPartner.toLowerCase() === partnerEmail.toLowerCase()) {
    const cached = _msgCache[partnerEmail.toLowerCase()];
    if (cached) {
      removeTypingIndicator();
      renderChatMessages(cached, partnerEmail);
    }
    return;
  }
  _activeListenPartner = partnerEmail;

  // Mostra immediatamente dalla cache se disponibile — zero latenza
  const cachedMsgs = _msgCache[partnerEmail.toLowerCase()];
  if (cachedMsgs && cachedMsgs.length > 0) {
    removeTypingIndicator();
    renderChatMessages(cachedMsgs, partnerEmail);
  }

  // Carica storico completo da Supabase (aggiorna la cache)
  _sb.from('messages')
    .select('*')
    .eq('conv_id', cid)
    .order('created_at', { ascending: true })
    .limit(200)
    .then(({ data, error }) => {
      if (error) { console.warn('[SB msg load]', error.message); return; }
      const msgs = (data || [])
        .filter(m => !(m.deleted_for || []).includes(currentUser.email.toLowerCase()))
        .map(m => ({
          id:          m.id,
          from:        m.sender_email,
          fromName:    m.sender_name,
          fromInitial: (m.sender_name || '?')[0].toUpperCase(),
          text:        m.text || '',
          media_url:   m.media_url || null,
          media_type:  m.media_type || null,
          ts:          m.created_at,
          deletedFor:  m.deleted_for || []
        }));
      if (msgs.length > 0) _msgLastSeen[partnerEmail] = msgs[msgs.length - 1].id;
      // Aggiorna cache in memoria
      _msgCache[partnerEmail.toLowerCase()] = msgs;
      if (currentConvPartnerEmail &&
          currentConvPartnerEmail.toLowerCase() === partnerEmail.toLowerCase()) {
        removeTypingIndicator();
        renderChatMessages(msgs, partnerEmail);
      }
    });

  // Ascolta nuovi messaggi in RT
  sbOff('messages');
  const ch = _sb.channel('messages_' + cid)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `conv_id=eq.${cid}`
    }, (payload) => {
      const m = payload.new;
      if (!m || (!m.text && !m.media_url)) return;
      if ((m.deleted_for || []).includes(currentUser.email.toLowerCase())) return;
      // Non duplicare messaggi già inviati da noi (già mostrati ottimisticamente)
      if (m.sender_email.toLowerCase() === currentUser.email.toLowerCase()) {
        // Aggiorna cache e preview lista conv
        const cacheKey = partnerEmail.toLowerCase();
        if (_msgCache[cacheKey]) {
          const alreadyCached = _msgCache[cacheKey].some(x => x.id === m.id);
          if (!alreadyCached) _msgCache[cacheKey].push({ id: m.id, from: m.sender_email, fromName: m.sender_name, fromInitial: (m.sender_name||'?')[0].toUpperCase(), text: m.text||'', media_url: m.media_url||null, media_type: m.media_type||null, ts: m.created_at, deletedFor: m.deleted_for||[] });
        }
        const conv = REAL_CONVS.find(c => c.partnerEmail.toLowerCase() === partnerEmail.toLowerCase());
        if (conv) { conv.lastMessage = m.text || '📎 Media'; conv.lastTs = m.created_at; renderConversations(); saveConvsCache(); }
        return;
      }
      const msg = {
        id: m.id, from: m.sender_email, fromName: m.sender_name,
        fromInitial: (m.sender_name || '?')[0].toUpperCase(),
        text: m.text || '', media_url: m.media_url || null, media_type: m.media_type || null,
        ts: m.created_at, deletedFor: m.deleted_for || []
      };
      // Aggiorna cache in memoria
      const cacheKey = partnerEmail.toLowerCase();
      if (!_msgCache[cacheKey]) _msgCache[cacheKey] = [];
      _msgCache[cacheKey].push(msg);
      appendMessageToChat(msg, false);
      // Notifica DM — solo se l'utente non è nel pannello messaggi
      const inMsgPanel = document.getElementById('panel-messages')?.classList.contains('active');
      if (!inMsgPanel) {
        const senderName = msg.fromName ? msg.fromName.split(' ')[0] : 'un membro';
        addRealNotification('direct_messages', '💬', `Nuovo messaggio da <strong>${senderName}</strong>`);
      }
      // Aggiorna preview lista conv
      const conv = REAL_CONVS.find(c => c.partnerEmail.toLowerCase() === partnerEmail.toLowerCase());
      if (conv) { conv.lastMessage = m.text || '📎 Media'; conv.lastTs = m.created_at; renderConversations(); saveConvsCache(); }
    }).subscribe();
  _sbChannels['messages'] = ch;
}

/* ── Listener Supabase per lista conversazioni ── */
function sbListenConversations() {
  if (!_sbReady || !currentUser) return;

  sbOff('conversations');
  const ch = _sb.channel('convs_' + emailKey(currentUser.email))
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'conversations',
      filter: `user_email=eq.${currentUser.email.toLowerCase()}`
    }, (payload) => {
      const c = payload.new;
      if (!c || !c.partner_email) return;
      const existing = REAL_CONVS.find(r => r.partnerEmail.toLowerCase() === c.partner_email.toLowerCase());
      if (existing) {
        existing.lastMessage = c.last_message || existing.lastMessage;
        existing.lastTs      = c.last_ts      || existing.lastTs;
        existing.unread = (currentConvPartnerEmail &&
          c.partner_email.toLowerCase() === currentConvPartnerEmail.toLowerCase()) ? 0 : (c.unread || 0);
      } else {
        const info = getPartnerInfo(c.partner_email);
        REAL_CONVS.push({
          partnerEmail:   c.partner_email,
          partnerName:    c.partner_name    || info.name,
          partnerInitial: c.partner_initial || info.initial,
          partnerRole:    c.partner_role    || info.role,
          lastMessage:    c.last_message || '',
          lastTs:         c.last_ts      || '',
          unread:         c.unread       || 0
        });
      }
      // Aggiorna badge messaggi non letti
      const totalUnread = REAL_CONVS.reduce((sum, conv) => sum + (conv.unread || 0), 0);
      const msgBadge = document.querySelector('.nav-item[onclick*="messages"] .nav-badge');
      if (msgBadge) {
        if (totalUnread > 0) { msgBadge.textContent = totalUnread; msgBadge.classList.remove('hidden'); }
        else { msgBadge.classList.add('hidden'); }
      }
      renderConversations();
      saveConvsCache(); // FIX: aggiorna cache dopo ogni update Supabase
    }).subscribe();
  _sbChannels['conversations'] = ch;
}

/* ── Listener Supabase per typing indicator ── */
function sbListenTyping(partnerEmail) {
  if (!_sbReady || !currentUser || !partnerEmail) return;
  const cid = convId(currentUser.email, partnerEmail);

  sbOff('typing');
  const ch = _sb.channel('typing_' + cid)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'typing',
      filter: `conv_id=eq.${cid}`
    }, (payload) => {
      const d = payload.new;
      if (!d) { _setTypingState(partnerEmail, false); return; }
      // Mostra solo il typing del partner, non il nostro
      if (d.user_email.toLowerCase() === currentUser.email.toLowerCase()) return;
      if (d.is_typing) {
        const age = Date.now() - new Date(d.updated_at).getTime();
        _setTypingState(partnerEmail, age < 6000);
      } else {
        _setTypingState(partnerEmail, false);
      }
    }).subscribe();
  _sbChannels['typing'] = ch;
}

/* Aggiorna stato typing per email e aggiorna UI lista + chat */
function _setTypingState(partnerEmail, isTyping) {
  const key = partnerEmail.toLowerCase();
  const changed = _typingByEmail[key] !== isTyping;
  _typingByEmail[key] = isTyping;
  // Aggiorna indicatore nella chat aperta
  if (currentConvPartnerEmail && currentConvPartnerEmail.toLowerCase() === key) {
    if (isTyping) showTypingIndicator(); else removeTypingIndicator();
  }
  // Aggiorna lista conversazioni solo se lo stato è cambiato
  if (changed) renderConversations();
}

async function pollMessages() {
  if (!GAS_URL || !currentUser) return;
  const panelActive = document.getElementById('panel-messages')?.classList.contains('active');
  if (!panelActive) { stopMessagePolling(); return; }

  // Esegui richieste messaggi e typing in parallelo — massima velocità
  _pollMsgCycle = (_pollMsgCycle || 0) + 1;
  const promises = [];

  // 1. Lista conversazioni ogni 3 cicli (600ms*3 = ~1.8s) — riduce il carico GAS
  if (_pollMsgCycle % 3 === 1) {
    promises.push(
      fetch(`${GAS_URL}?action=get_conversations&email=${encodeURIComponent(currentUser.email)}`)
        .then(r => r.json())
        .then(data => {
          if (data.success && Array.isArray(data.conversations)) {
            REAL_CONVS = data.conversations.map(c => {
              const info = getPartnerInfo(c.partnerEmail);
              return {
                partnerEmail: c.partnerEmail,
                partnerName: c.partnerName || info.name,
                partnerInitial: c.partnerInitial || info.initial,
                partnerRole: c.partnerRole || info.role,
                lastMessage: c.lastMessage || '',
                lastTs: c.lastTs || '',
                unread: currentConvPartnerEmail && c.partnerEmail.toLowerCase() === currentConvPartnerEmail.toLowerCase() ? 0 : (c.unread || 0)
              };
            });
            if (currentConvPartnerEmail) {
              const _aInList = REAL_CONVS.some(c => c.partnerEmail.toLowerCase() === currentConvPartnerEmail.toLowerCase());
              if (!_aInList) {
                const _pi2 = getPartnerInfo(currentConvPartnerEmail);
                REAL_CONVS.unshift({ partnerEmail: currentConvPartnerEmail, partnerName: _pi2.name, partnerInitial: _pi2.initial, partnerRole: _pi2.role, lastMessage: '', lastTs: new Date().toISOString(), unread: 0 });
              }
            }
            renderConversations();
          }
        }).catch(() => {})
    );
  }

  if (!currentConvPartnerEmail) {
    await Promise.allSettled(promises);
    return;
  }

  // 2. Nuovi messaggi — ogni ciclo (600ms) — parallelo con typing
  promises.push(
    fetch(`${GAS_URL}?action=get_messages&email1=${encodeURIComponent(currentUser.email)}&email2=${encodeURIComponent(currentConvPartnerEmail)}&requesterEmail=${encodeURIComponent(currentUser.email)}`)
      .then(r => r.json())
      .then(data => {
        if (data.success && Array.isArray(data.messages) && data.messages.length > 0) {
          const lastKnown = _msgLastSeen[currentConvPartnerEmail];
          const newMsgs = lastKnown
            ? data.messages.filter(m => m.id > lastKnown && m.from.toLowerCase() !== currentUser.email.toLowerCase())
            : [];
          if (newMsgs.length > 0) {
            removeTypingIndicator();
            newMsgs.forEach(m => appendMessageToChat(m, false));
            _msgLastSeen[currentConvPartnerEmail] = data.messages[data.messages.length - 1].id;
          }
        }
      }).catch(() => {})
  );

  // 3. Typing indicator — ogni ciclo, parallelo con messaggi
  promises.push(
    fetch(`${GAS_URL}?action=get_typing&email=${encodeURIComponent(currentConvPartnerEmail)}&otherEmail=${encodeURIComponent(currentUser.email)}`)
      .then(r => r.json())
      .then(data => { if (data.isTyping) showTypingIndicator(); else removeTypingIndicator(); })
      .catch(() => {})
  );

  await Promise.allSettled(promises);
}


/* ── Typing indicator ── */
function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); return; }
}

/* Fires on every input change — triggers typing status immediately */
function handleChatInput(e) {
  const val = e && e.target ? e.target.value : (document.getElementById('chatInput')?.value || '');
  if (val.length > 0) {
    sendTypingStatus(true);
  } else {
    clearTypingStatus();
  }
}

function sendTypingStatus(isTyping) {
  if (!currentConvPartnerEmail || !currentUser) return;
  const now = Date.now();
  if (isTyping && now - _typingSentAt < 800) return; // throttle 800ms
  _typingSentAt = now;

  // Supabase: scrittura istantanea — zero latenza
  if (_sbReady) {
    const cid = convId(currentUser.email, currentConvPartnerEmail);
    if (isTyping) {
      _sb.from('typing').upsert({
        conv_id:    cid,
        user_email: currentUser.email.toLowerCase(),
        is_typing:  true,
        updated_at: new Date().toISOString()
      }, { onConflict: 'conv_id,user_email' }).then(null, ()=>{});
      // Auto-rimuovi dopo 5s di inattività
      if (_typingTimer) clearTimeout(_typingTimer);
      _typingTimer = setTimeout(() => {
        _sb.from('typing').upsert({
          conv_id:    cid,
          user_email: currentUser.email.toLowerCase(),
          is_typing:  false,
          updated_at: new Date().toISOString()
        }, { onConflict: 'conv_id,user_email' }).then(null, ()=>{});
      }, 5000);
    } else {
      _sb.from('typing').upsert({
        conv_id:    cid,
        user_email: currentUser.email.toLowerCase(),
        is_typing:  false,
        updated_at: new Date().toISOString()
      }, { onConflict: 'conv_id,user_email' }).then(null, ()=>{});
    }
  } else {

    fetch(`${GAS_URL}?action=set_typing&email=${encodeURIComponent(currentUser.email)}&otherEmail=${encodeURIComponent(currentConvPartnerEmail)}&isTyping=${isTyping}`).catch(()=>{});

/* ── Elimina cronologia solo per l'utente corrente ── */
async function deleteMyHistory() {
  if (!currentConvPartnerEmail || !currentUser) return;
  if (!confirm('Elimina tutta la cronologia di questa conversazione solo per te? L\'altro utente continuerà a vedere i propri messaggi.')) return;

  // Supabase: cancellazione intelligente
  // → Se l'altro utente ha già eliminato: cancella la riga fisicamente (libera spazio)
  // → Altrimenti: marca come eliminata solo per te (soft delete)
  if (_sbReady) {
    const cid = convId(currentUser.email, currentConvPartnerEmail);
    const { data: msgs } = await _sb.from('messages').select('id, deleted_for').eq('conv_id', cid);
    if (msgs && msgs.length > 0) {
      const toDelete = []; // righe da eliminare fisicamente
      const toUpdate = []; // righe da marcare soft-deleted
      for (const m of msgs) {
        const df = m.deleted_for || [];
        if (df.includes(currentUser.email.toLowerCase())) continue; // già marcata per noi
        const updatedDf = [...df, currentUser.email.toLowerCase()];
        // Se entrambi gli utenti hanno eliminato → cancellazione fisica
        const otherAlsoDeleted = df.includes(currentConvPartnerEmail.toLowerCase());
        if (otherAlsoDeleted) {
          toDelete.push(m.id);
        } else {
          toUpdate.push({ id: m.id, deleted_for: updatedDf });
        }
      }
      if (toDelete.length > 0) {
        await Promise.resolve(_sb.from('messages').delete().in('id', toDelete)).catch(()=>{});
      }
      for (const u of toUpdate) {
        await Promise.resolve(_sb.from('messages').update({ deleted_for: u.deleted_for }).eq('id', u.id)).catch(()=>{});
      }
    }
    // Rimuovi la conv dal proprio record
    await Promise.resolve(_sb.from('conversations')
      .delete()
      .eq('conv_id', cid)
      .eq('user_email', currentUser.email.toLowerCase())).catch(()=>{});
  }

  if (!GAS_URL) {
    REAL_CONVS = REAL_CONVS.filter(c => c.partnerEmail.toLowerCase() !== currentConvPartnerEmail.toLowerCase());
    renderConversations();
    const messagesEl = document.getElementById('chatMessages');
    if (messagesEl) messagesEl.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--muted2);font-size:0.8rem;">Cronologia eliminata.</div>';
    showToast('green','🗑','Cronologia eliminata.');
    currentConvPartnerEmail = null;
    document.getElementById('chatHeaderName').textContent = 'Seleziona una conversazione';
    document.getElementById('chatHeaderStatus').textContent = '—';
    return;
  }
  try {
    const resp = await fetch(`${GAS_URL}?action=delete_messages_for_user&email=${encodeURIComponent(currentUser.email)}&otherEmail=${encodeURIComponent(currentConvPartnerEmail)}`);
    const data = await resp.json();
    if (data.success) {
      REAL_CONVS = REAL_CONVS.filter(c => c.partnerEmail.toLowerCase() !== currentConvPartnerEmail.toLowerCase());
      renderConversations();
      const messagesEl = document.getElementById('chatMessages');
      if (messagesEl) messagesEl.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--muted2);font-size:0.8rem;">Cronologia eliminata.</div>';
      showToast('green','🗑','Cronologia eliminata. L\'altro utente continua a vedere i suoi messaggi.');
      currentConvPartnerEmail = null;
      document.getElementById('chatHeaderName').textContent = 'Seleziona una conversazione';
      document.getElementById('chatHeaderStatus').textContent = '—';
    }
  } catch(e) { showToast('red','⚠️','Errore durante l\'eliminazione.'); }
}

/* Converte data ISO o "GG/MM/AAAA - HH:MM" → "15 Novembre 2024" */
function formatJoinDate(raw) {
  if (!raw) return '—';
  const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                  'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  try {
    // Formato ISO
    const d = new Date(raw);
    if (!isNaN(d.getTime())) return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    // Formato GG/MM/AAAA
    const m = String(raw).match(/(\d{1,2})[\/\.](\d{2})[\/\.](\d{4})/);
    if (m) return `${parseInt(m[1])} ${months[parseInt(m[2])-1]} ${m[3]}`;
  } catch(_e) {}
  return String(raw);
}

/* Converte codice lingua → nome esteso */
function langCodeToName(code) {
  const map = { IT:'Italiano', EN:'English', FR:'Français', DE:'Deutsch', ES:'Español' };
  return map[(code||'IT').toUpperCase()] || 'Italiano';
}

const NOTIF_PREF_DEFAULTS = {
  project_updates:  true,   // nuovi aggiornamenti dal team
  direct_messages:  true,   // messaggi privati
  new_listings:     true,   // nuove proprietà disponibili

function _notifPrefKey() {
  return currentUser ? `lh360_np_${currentUser.email.replace(/[^a-z0-9]/gi,'_')}` : null;
}
function loadNotifPrefs() {
  const k = _notifPrefKey();
  if (!k) return { ...NOTIF_PREF_DEFAULTS };
  try {
    const raw = localStorage.getItem(k);
    return raw ? { ...NOTIF_PREF_DEFAULTS, ...JSON.parse(raw) } : { ...NOTIF_PREF_DEFAULTS };
  } catch(_e) { return { ...NOTIF_PREF_DEFAULTS }; }
}
function saveNotifPrefsLocal(prefs) {
  const k = _notifPrefKey();
  if (!k) return;
  try { localStorage.setItem(k, JSON.stringify(prefs)); } catch(_e) {}
  // Sync background GAS
  if (typeof GAS_URL !== 'undefined' && GAS_URL && currentUser) {
    fetch(`${GAS_URL}?action=save_notif_prefs&email=${encodeURIComponent(currentUser.email)}&prefs=${encodeURIComponent(JSON.stringify(prefs))}`).catch(()=>{});
  }
}
function isNotifEnabled(prefKey) {
  const p = loadNotifPrefs();
  return p[prefKey] !== false;
}

/* Cache notifiche su localStorage per persistenza cross-sessione */
const NOTIF_CACHE_KEY = 'lh360_notif_cache_v1';
function _saveNotifCache() {
  try { localStorage.setItem(NOTIF_CACHE_KEY, JSON.stringify(NOTIFICATIONS.slice(0, 50))); } catch(_e) {}
}
function _loadNotifCache() {
  try {
    const raw = localStorage.getItem(NOTIF_CACHE_KEY);
    if (!raw) return;
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr) || arr.length === 0) return;
    arr.forEach(n => {
      // Rifissa time relativo
      if (n.ts) n.time = _notifRelTime(n.ts);
      if (!NOTIFICATIONS.some(x => x.id === n.id)) NOTIFICATIONS.push(n);
    });
    NOTIFICATIONS.sort((a,b) => (b.id||0) - (a.id||0));
    updateNotifBadge();
    renderNotifDropdown();
  } catch(_e) {}
}
function _notifRelTime(ts) {
  if (!ts) return 'Ora';
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(diff / 86400000);
  if (m < 1) return 'Ora';
  if (m < 60) return m + 'm fa';
  if (h < 24) return h + 'h fa';
  return d + 'g fa';
}

/* ── Statistiche attività utente ── */
function _uStatsKey() {
  return currentUser ? `lh360_us_${currentUser.email.replace(/[^a-z0-9]/gi,'_')}` : null;
}
function loadUserStats() {
  const k = _uStatsKey();
  if (!k) return { readPosts: [] };
  try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : { readPosts: [] }; }
  catch(_e) { return { readPosts: [] }; }
}
function saveUserStats(s) {
  const k = _uStatsKey(); if (!k) return;
  try { localStorage.setItem(k, JSON.stringify(s)); } catch(_e) {}
}
function markPostRead(postId) {
  if (!postId) return;
  const s = loadUserStats();
  if (s.readPosts.includes(postId)) return;
  s.readPosts.push(postId); saveUserStats(s);
  // Aggiorna il contatore nel profilo se visibile
  const el = document.getElementById('profileStatPostsRead');
  if (el) el.textContent = s.readPosts.length;
}
function countUserComments() {
  if (!currentUser) return 0;
  const name = currentUser.name;
  let n = 0;
  FEED_POSTS.forEach(p => {
    if (p.commentsData) n += p.commentsData.filter(c => c.author === name).length;
  });
  return n;
}
function countUserDiscussions() {
  if (!currentUser) return 0;
  return DISCUSSIONS.filter(d => d.author === currentUser.name).length;
}

/* IntersectionObserver: marca i post come letti quando scorrono nella viewport */
let _feedReadObserver = null;
function initFeedReadTracking() {
  if (_feedReadObserver) _feedReadObserver.disconnect();
  _feedReadObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = parseInt((e.target.id||'').replace('post-',''), 10);
        if (id) markPostRead(id);
      }
    });
  }, { threshold: 0.4 });
  document.querySelectorAll('.feed-post[id^="post-"]').forEach(el => _feedReadObserver.observe(el));
}

/* Toggle notifica dall'UI */
function toggleNotifPref(el) {
  const prefKey = el.dataset.pref;
  const nowOn = !el.classList.contains('off'); // stato attuale
  const newState = !nowOn;
  const inner = el.querySelector('div');
  if (newState) {
    el.classList.remove('off'); el.style.background='var(--gold)'; el.style.borderColor='var(--gold)';
    if (inner) { inner.style.left='calc(100% - 16px)'; inner.style.background='var(--darker)'; }

    if (inner) { inner.style.left='1px'; inner.style.background='var(--muted2)'; }

                   new_listings:'nuovi listing', post_replies:'risposte ai post' };

}

    const msgs = { remove:'Contenuto rimosso con successo.', warn:'Avviso inviato all\'utente.', dismiss:'Segnalazione archiviata.' };

}

/* Formatta una data ISO in "15 Mar 2025" */
function formatEventDate(iso) {
  if (!iso) return '';
  const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  } catch(_e) { return iso; }
}

  };
  FEED_POSTS.unshift(newPost);
  renderFeed();
  renderFeedPreview();

  showToast('gold','📢','Comunicazione pubblicata con successo!');
  logActivity('gold', `<strong>${currentUser.name}</strong> ha pubblicato un aggiornamento`);
  // Scrivi su Supabase community_activity e aggiorna snapshot notifiche
  _writeActivityToSupabase('gold', `<strong>Team LH360</strong> ha pubblicato: ${title}`);
  // Aggiungi subito l'ID al set dei post noti (evita auto-notifica al team)
  _lastKnownTeamPostIds.add(newPost.id);
  showPanel('feed', document.querySelector('.nav-item'));
  titleEl.value   = '';
  contentEl.value = '';

  // Persisti su GAS
  if (GAS_URL) {
    try {
      const url = `${GAS_URL}?action=publish_post` +
        `&author=${encodeURIComponent(currentUser.name)}` +
        `&initial=${encodeURIComponent(currentUser.initial)}` +
        `&role=${encodeURIComponent(currentUser.title)}` +
        `&type=${encodeURIComponent(postType)}` +
        `&title=${encodeURIComponent(title)}` +
        `&text=${encodeURIComponent(content)}` +
        `&locked=${encodeURIComponent(locked)}`;
      const data = await fetch(url).then(r => r.json());
      if (data.success && data.post) {
        // Aggiorna ID locale con quello reale dal server
        const idx = FEED_POSTS.findIndex(p => p.id === tempId);
        if (idx !== -1) FEED_POSTS[idx].id = data.post.id;
        saveCommunityCache();
        loadDashboardStats();
      }
    } catch(e) {
      console.warn('[Broadcast] GAS error:', e.message);
    }
  }
}

function showToast(color, icon, text) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-icon ${color}">${icon}</div>
    <div class="toast-text">${text}</div>
    <button class="toast-close" onclick="this.parentElement.remove()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('out');
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

/* ═══════════════════════════════════════════
   PRESENZA REAL-TIME — SUPABASE
   Sostituisce completamente il sistema Firebase
═══════════════════════════════════════════ */
const HEARTBEAT_INTERVAL = 25 * 1000; // keep-alive ogni 25s
let _heartbeatTimer = null;
let _presencePollTimer = null;
let _sbPresenceCh = null; // Supabase Presence Channel — gestisce offline automaticamente

/* ── Registra presenza utente su Supabase (tabella persistence + channel) ── */
async function sbSetPresence() {
  if (!_sbReady || !currentUser) return;
  try {
    await _sb.from('presence').upsert({
      email:      currentUser.email.toLowerCase(),
      name:       currentUser.name,
      initial:    currentUser.initial,
      role:       currentUser.role,
      online:     true,
      updated_at: new Date().toISOString()
    }, { onConflict: 'email' });
  } catch(e) { console.warn('[SB presence]', e.message); }
}

const fbSetPresence = sbSetPresence;

/* ── Rimuovi presenza (logout/chiusura) ── */
async function removePresence() {
  if (_heartbeatTimer) { clearInterval(_heartbeatTimer); _heartbeatTimer = null; }
  // Untrack dal Presence Channel — notifica immediata agli altri utenti
  if (_sbPresenceCh) {
    try { await _sbPresenceCh.untrack(); } catch(_e) {}
    try { _sb.removeChannel(_sbPresenceCh); } catch(_e) {}
    _sbPresenceCh = null;
  }
  if (_sbReady && currentUser) {
    try { await _sb.from('presence').update({ online: false }).eq('email', currentUser.email.toLowerCase()); } catch(_e) {}
  }
  if (GAS_URL && currentUser) {
    try { await fetch(`${GAS_URL}?action=remove_presence&email=${encodeURIComponent(currentUser.email)}`); } catch(_e) {}
  }
}

/* ── Marca offline via sendBeacon (garantito su beforeunload, non-bloccante) ── */
function removePresenceSync() {
  if (!currentUser) return;
  // sendBeacon è fire-and-forget ma è garantito dal browser anche durante unload
  if (GAS_URL) {
    try {
      navigator.sendBeacon(`${GAS_URL}?action=remove_presence&email=${encodeURIComponent(currentUser.email)}`);
    } catch(_e) {}
  }
  // Supabase: chiudi il channel websocket — il server rimuove la presenza automaticamente
  if (_sbPresenceCh) {
    try { _sbPresenceCh.untrack(); } catch(_e) {}
  }
}

/* ── Recupera lista membri online dalla tabella presence (fallback polling) ── */
async function sbGetOnlineMembers() {
  if (!_sbReady) return;
  try {
    const { data, error } = await _sb.from('presence').select('*').eq('online', true);
    if (error) return;
    // Filtra presenze stantie (>90s senza heartbeat — heartbeat ogni 30s)
    const fresh = (data || []).filter(u => {
      if (!u.updated_at) return false;
      return Date.now() - new Date(u.updated_at).getTime() < 90 * 1000;
    });
    applyPresenceData(fresh);
  } catch(_e) {}
}

/* ── Supabase Presence Channel — presenza con offline automatico su disconnessione ── */
function sbListenPresence() {
  if (!_sbReady) {
    _startPresencePollGAS();
    return;
  }
  // Rimuovi canale precedente
  if (_sbPresenceCh) {
    try { _sb.removeChannel(_sbPresenceCh); } catch(_e) {}
    _sbPresenceCh = null;
  }

  const channelKey = 'community-presence';
  _sbPresenceCh = _sb.channel(channelKey, {
    config: { presence: { key: currentUser.email.toLowerCase() } }
  });

  _sbPresenceCh
    .on('presence', { event: 'sync' }, () => {
      // Supabase Presence: quando un utente si disconnette, viene rimosso automaticamente
      const state = _sbPresenceCh.presenceState();
      const onlineList = Object.values(state).flat().map(u => ({
        email:   u.email   || '',
        name:    u.name    || '',
        initial: u.initial || '?',
        role:    u.role    || ''
      }));
      applyPresenceData(onlineList);
    })
    .on('presence', { event: 'join' }, ({ newPresences }) => {
      // Nuovo utente entrato
      sbGetOnlineMembers();
    })
    .on('presence', { event: 'leave' }, ({ leftPresences }) => {
      // Utente uscito — rimuovilo dalla lista immediatamente
      const leftEmails = (leftPresences || []).map(p => (p.email || '').toLowerCase());
      if (leftEmails.length > 0) {
        leftEmails.forEach(em => {
          const idx = ONLINE_MEMBERS.findIndex(m => m.email && m.email.toLowerCase() === em);
          if (idx !== -1) ONLINE_MEMBERS.splice(idx, 1);
        });
        saveOnlineCache();
        renderRightPanel();
        const countEl = document.getElementById('dashOnlineCount');
        if (countEl) countEl.textContent = ONLINE_MEMBERS.length;
      }
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        // Track la propria presenza nel channel
        try {
          await _sbPresenceCh.track({
            email:   currentUser.email.toLowerCase(),
            name:    currentUser.name,
            initial: currentUser.initial,
            role:    currentUser.role
          });
        } catch(_e) { console.warn('[Presence track]', _e.message); }
        // Carica lista iniziale dalla tabella
        sbGetOnlineMembers();
      }
    });

  // Ascolta anche i cambiamenti nella tabella presence (fallback per utenti senza channel)
  sbOff('presence_rt');
  const tblCh = _sb.channel('presence_table_rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'presence' }, () => {
      sbGetOnlineMembers();
    }).subscribe();
  _sbChannels['presence_rt'] = tblCh;
}

const fbListenPresence = sbListenPresence;

/* ── Invia heartbeat a GAS (fallback/compatibilità) ── */
async function sendHeartbeatGAS() {
  if (!GAS_URL || !currentUser) return;
  try {
    await fetch(`${GAS_URL}?action=heartbeat` +
      `&email=${encodeURIComponent(currentUser.email)}` +
      `&name=${encodeURIComponent(currentUser.name)}` +
      `&initial=${encodeURIComponent(currentUser.initial)}` +
      `&role=${encodeURIComponent(currentUser.role)}`);
  } catch(_e) {}
}
const sendHeartbeat = sendHeartbeatGAS;

/* ── Polling GAS fallback (solo se Supabase non disponibile) ── */
function _startPresencePollGAS() {
  if (_presencePollTimer) clearInterval(_presencePollTimer);
  _presencePollTimer = setInterval(async () => {
    if (!GAS_URL || !currentUser) return;
    try {
      const r = await fetch(`${GAS_URL}?action=get_online_members`);
      const d = await r.json();
      if (d.success && Array.isArray(d.members)) applyPresenceData(d.members);
    } catch(_e) {}
  }, 15000);
}

/* ── Avvia il sistema di presenza ── */
function startPresenceSystem() {
  if (currentUser) {
    const alreadyIn = ONLINE_MEMBERS.some(m => m.email === currentUser.email);
    if (!alreadyIn) {
      ONLINE_MEMBERS.unshift({ name: currentUser.name, initial: currentUser.initial, role: currentUser.role, email: currentUser.email });
      renderRightPanel();
    }
  }
  // 1. Registra su tabella Supabase (persistenza)
  sbSetPresence();
  // 2. Avvia Presence Channel (offline automatico su disconnect)
  sbListenPresence();
  // 3. Keep-alive ogni 30s
  if (_heartbeatTimer) clearInterval(_heartbeatTimer);
  _heartbeatTimer = setInterval(() => {
    if (_sbReady) sbSetPresence();
    sendHeartbeatGAS();
    // Re-track nel presence channel (mantiene la connessione attiva)
    if (_sbPresenceCh && currentUser) {
      try {
        _sbPresenceCh.track({ email: currentUser.email.toLowerCase(), name: currentUser.name, initial: currentUser.initial, role: currentUser.role });
      } catch(_e) {}
    }
  }, HEARTBEAT_INTERVAL);

  // ── Offline su chiusura tab/browser (sendBeacon — garantito)
  window.addEventListener('beforeunload', removePresenceSync);

  // ── Offline/online su cambio visibilità tab
  window.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      // Tab nascosta: segna offline preventivamente
      if (_sbReady && currentUser) {
        _sb.from('presence').update({ online: false, updated_at: new Date().toISOString() })
          .eq('email', currentUser.email.toLowerCase()).then(()=>{}).catch(()=>{});
      }
    } else {
      // Tab tornata visibile: ripristina presenza
      sbSetPresence();
      if (_sbPresenceCh && currentUser) {
        try {
          _sbPresenceCh.track({ email: currentUser.email.toLowerCase(), name: currentUser.name, initial: currentUser.initial, role: currentUser.role });
        } catch(_e) {}
      }
    }
  });

  // ── Offline su freeze della pagina (mobile/tablet)
  window.addEventListener('freeze', removePresenceSync, { capture: true });
}

function applyPresenceData(onlineList) {

  onlineList.forEach(u => ONLINE_MEMBERS.push(u));

  // Garanzia: l'utente corrente è sempre visibile nella propria lista

  if (currentUser) {

/* Aggiorna la lista eventi dal payload GAS */
function applyEventsData(eventsList) {
  if (!Array.isArray(eventsList)) return;
  const _snapshot = [...eventsList]; // snapshot prima di svuotare, evita bug self-reference
  EVENTS.length = 0;
  _snapshot.forEach(e => EVENTS.push(e));

  // Re-inietta gli eventi pendenti locali che il server non conosce ancora
  if (_pendingLocalEvents.length > 0) {
    const serverIds = new Set(_snapshot.map(e => e._localId || e.id));
    _pendingLocalEvents = _pendingLocalEvents.filter(pe => {
      if (serverIds.has(pe._localId)) return false; // il server lo ha già → rimuovi dal pending
      EVENTS.push(pe); // ancora non sul server → mantienilo visibile
      return true;
    });
    EVENTS.sort((a, b) => new Date(a.dateIso) - new Date(b.dateIso));
  }
  renderRightPanel();

  // Aggiorna anche la label "In Diretta" nell'header
  const hasLive = EVENTS.some(e => e.isLive);
  const headerLive = document.getElementById('headerLiveIndicator');
  if (headerLive) headerLive.style.display = hasLive ? 'flex' : 'none';

  // Persisti gli eventi in cache locale per rendering immediato al prossimo caricamento
  saveEventsCache();
}

/* ─── Toggle evento live (solo team) ─── */
async function toggleEventLive(eventId, goLive) {
  if (!GAS_URL) return;
  try {
    const r = await fetch(`${GAS_URL}?action=set_event_live&eventId=${eventId}&live=${goLive}`);
    const d = await r.json();
    if (d.success) {
      const ev = EVENTS.find(e => e.id === eventId);
      if (ev) ev.isLive = goLive;
      applyEventsData(EVENTS);
      showToast(goLive ? 'gold' : 'blue', goLive ? '🔴' : '⏹',
        goLive ? 'Evento impostato come LIVE!' : 'Live terminato.');
    }
  } catch(_e) { showToast('red','⚠️','Errore aggiornamento evento.'); }
}

/* ─── Elimina evento (solo team) ─── */
async function deleteEventUI(eventId) {
  if (!GAS_URL) return;
  try {
    const r = await fetch(`${GAS_URL}?action=delete_event&eventId=${eventId}`);
    const d = await r.json();
    if (d.success) {
      const idx = EVENTS.findIndex(e => e.id === eventId);
      if (idx !== -1) EVENTS.splice(idx, 1);
      applyEventsData(EVENTS);
      showToast('green','✓','Evento eliminato.');
    }
  } catch(_e) { showToast('red','⚠️','Errore eliminazione evento.'); }
}


/* ═══════════════════════════════════════════
   GESTIONE EVENTI (Admin)
═══════════════════════════════════════════ */
async function createEventUI() {
  const title   = (document.getElementById('eventTitleInput')?.value   || '').trim();
  const dateVal = (document.getElementById('eventDateInput')?.value    || '').trim();
  const timeStr = (document.getElementById('eventTimeStrInput')?.value || '').trim();
  const meta    = (document.getElementById('eventMetaInput')?.value    || '').trim();

  if (!title)   { showToast('red','⚠️','Il titolo è obbligatorio.'); return; }
  if (!dateVal) { showToast('red','⚠️','La data è obbligatoria.'); return; }
  const dateIso = new Date(dateVal).toISOString();

  const _localId = 'local_' + Date.now();

  if (GAS_URL) {
    try {
      const r = await fetch(`${GAS_URL}?action=save_event` +
        `&title=${encodeURIComponent(title)}&dateIso=${encodeURIComponent(dateIso)}` +
        `&timeStr=${encodeURIComponent(timeStr)}&meta=${encodeURIComponent(meta)}`);
      const d = await r.json();
      if (d.success && d.event) {
        // Rimuovi l'eventuale pending locale corrispondente
        _pendingLocalEvents = _pendingLocalEvents.filter(pe => pe._localId !== _localId);
        EVENTS.push(d.event);
        EVENTS.sort((a,b) => new Date(a.dateIso) - new Date(b.dateIso));
        applyEventsData(EVENTS);
        renderEventsAdminList();
        ['eventTitleInput','eventDateInput','eventTimeStrInput','eventMetaInput']
          .forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
        showToast('gold','📅','Evento creato con successo!');
        return;
      } else {
        showToast('red','⚠️', 'GAS error: ' + (d.error || 'risposta inattesa'));
      }
    } catch(_e) {
      showToast('amber','⚠️','GAS non raggiungibile: ' + _e.message);
    }
  }
  // Fallback locale: l'evento viene tracciato come pending finché GAS non lo conferma
  const newEvt = { _localId, id: Date.now(), title, dateIso, timeStr, meta, accessLevel:'all', isLive:false, createdAt:new Date().toISOString() };
  _pendingLocalEvents.push(newEvt);
  EVENTS.push(newEvt);
  EVENTS.sort((a,b) => new Date(a.dateIso) - new Date(b.dateIso));
  applyEventsData(EVENTS);
  renderEventsAdminList();
  ['eventTitleInput','eventDateInput','eventTimeStrInput','eventMetaInput']
    .forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  showToast('amber','📅','Evento salvato localmente (GAS non raggiungibile — non persisterà al refresh).');
}

function renderEventsAdminList() {
  const container = document.getElementById('eventsAdminList');
  if (!container) return;
  if (EVENTS.length === 0) {
    container.innerHTML = '<div style="font-size:0.72rem;color:var(--muted2);padding:0.5rem 0;">Nessun evento creato.</div>';
    return;
  }
  container.innerHTML = EVENTS.map(e => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border2);gap:0.5rem;">
      <div style="min-width:0;flex:1;">
        <div style="font-size:0.75rem;color:var(--light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${e.title}</div>
        <div style="font-size:0.65rem;color:var(--muted2);">${formatEventDate(e.dateIso)}${e.timeStr?' · '+e.timeStr:''}</div>
        ${e.isLive ? '<span style="font-size:0.6rem;color:var(--amber);letter-spacing:0.1em;">● LIVE</span>' : ''}
      </div>
      <div style="display:flex;gap:0.3rem;flex-shrink:0;">
        <button onclick="toggleEventLiveAdmin(${e.id},${!e.isLive})"
          style="font-size:0.62rem;padding:2px 8px;border-radius:4px;border:1px solid ${e.isLive?'var(--amber)':'var(--green)'};background:transparent;color:${e.isLive?'var(--amber)':'var(--green)'};cursor:pointer;">
          ${e.isLive?'⏹ Stop':'▶ Live'}
        </button>
        <button onclick="endEventAdmin(${e.id})"
          style="font-size:0.62rem;padding:2px 8px;border-radius:4px;border:1px solid var(--amber);background:transparent;color:var(--amber);cursor:pointer;">⏏ Termina</button>
        <button onclick="completeEventAdmin(${e.id})"
          style="font-size:0.62rem;padding:2px 8px;border-radius:4px;border:1px solid var(--green);background:transparent;color:var(--green);cursor:pointer;">✔ Completa</button>
        <button onclick="deleteEventAdmin(${e.id})"
          style="font-size:0.62rem;padding:2px 7px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;">✕ Elimina</button>
      </div>
    </div>`).join('');
}

async function toggleEventLiveAdmin(eventId, goLive) {
  await toggleEventLive(eventId, goLive);
  renderEventsAdminList();
}

async function endEventUI(eventId) {
  if (!GAS_URL) return;
  try {
    const r = await fetch(`${GAS_URL}?action=complete_event&eventId=${eventId}&mode=end`);
    const d = await r.json();
    if (d.success) {
      const idx = EVENTS.findIndex(e => e.id === eventId);
      if (idx !== -1) EVENTS[idx].isEnded = true;
      applyEventsData(EVENTS);
      showToast('amber','⏏','Evento terminato.');
    }
  } catch(_e) {
    // fallback locale
    const idx = EVENTS.findIndex(e => e.id === eventId);
    if (idx !== -1) { EVENTS[idx].isEnded = true; applyEventsData(EVENTS); }
    showToast('amber','⏏','Evento terminato localmente.');
  }
  renderEventsAdminList();
}

async function completeEventUI(eventId) {
  if (!GAS_URL) return;
  try {
    const r = await fetch(`${GAS_URL}?action=complete_event&eventId=${eventId}&mode=complete`);
    const d = await r.json();
    if (d.success) {
      const idx = EVENTS.findIndex(e => e.id === eventId);
      if (idx !== -1) EVENTS[idx].isCompleted = true;
      applyEventsData(EVENTS);
      showToast('gold','✔','Evento completato.');
    }
  } catch(_e) {
    const idx = EVENTS.findIndex(e => e.id === eventId);
    if (idx !== -1) { EVENTS[idx].isCompleted = true; applyEventsData(EVENTS); }
    showToast('amber','✔','Evento completato localmente.');
  }
  renderEventsAdminList();
}

async function endEventAdmin(eventId)      { await endEventUI(eventId);      renderEventsAdminList(); }
async function completeEventAdmin(eventId) { await completeEventUI(eventId); renderEventsAdminList(); }

async function deleteEventAdmin(eventId) {
  await deleteEventUI(eventId);
  renderEventsAdminList();
}
