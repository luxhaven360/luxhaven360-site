═══════════════════════════════════════════ */
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });

async function doLogin() {
  const emailInput = document.getElementById('loginEmail');
  const passInput  = document.getElementById('loginPass');
  const errorEl    = document.getElementById('loginError');
  const loginBtn   = document.getElementById('loginBtn');

  const email    = emailInput.value.trim().toLowerCase();
  const password = passInput.value.trim();

  if (!email || !password) {
    errorEl.textContent = 'Inserisci email e password.';
    errorEl.classList.add('show');
    return;
  }

  // UI: loading state
  loginBtn.disabled  = true;
  loginBtn.textContent = 'Verifica in corso…';
  errorEl.classList.remove('show');

  try {
    if (!GAS_URL || GAS_URL === 'YOUR_GAS_DEPLOYMENT_URL_HERE') {
      throw new Error('GAS_URL non configurato. Aggiorna la costante GAS_URL nel codice.');
    }

    const url = `${GAS_URL}?action=verify_login_extended&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Errore di rete: ' + resp.status);
    const data = await resp.json();

    if (data.success && data.authorized && data.user) {
      currentUser = data.user;
      saveSession(currentUser);

      // ── Pre-carica le statistiche durante il login ─────────────────────────
      // Aggiorna il testo del pulsante per dare feedback visivo
      loginBtn.textContent = 'Connessione in corso…';
      try {
        const statsResp = await fetch(`${GAS_URL}?action=get_dashboard_stats`);
        if (statsResp.ok) {
          const statsData = await statsResp.json();
          if (statsData && statsData.success) saveStatsCache(statsData);
        }
      } catch (_e) { /* silenzioso */ }

      document.documentElement.classList.remove('no-session');
      const mainAppEl = document.getElementById('mainApp');
      mainAppEl.style.cssText = '';
      document.getElementById('loginGate').style.display = 'none';
      mainAppEl.classList.add('active');
      initApp();
    } else {
      const msg = data.error || 'Credenziali non valide. Riprova.';
      errorEl.textContent = msg;
      errorEl.classList.add('show');
      passInput.value = '';
      passInput.focus();
    }
  } catch(err) {
    errorEl.textContent = 'Errore di connessione: ' + err.message;
    errorEl.classList.add('show');
    passInput.value = '';
  } finally {
    loginBtn.disabled  = false;
    loginBtn.textContent = 'Accedi alla Community';
  }
}

function logout() {
  // Segna offline immediatamente prima del redirect
  removePresenceSync();
  if (_heartbeatTimer) { clearInterval(_heartbeatTimer); _heartbeatTimer = null; }
  removePresence(); // async cleanup
  currentUser = null;
  clearSession();
  window.location.href = '../the-project/community.html';
}

/* ═══════════════════════════════════════════
   AUTO-AUTH CHECK (eseguito al caricamento)
═══════════════════════════════════════════ */
(async function checkSessionOnLoad() {
  const saved = loadSession();
  if (!saved) return; // nessuna sessione: login gate già visibile

  currentUser = saved;
  document.documentElement.classList.remove('no-session');
  const mainAppEl = document.getElementById('mainApp');
  mainAppEl.style.cssText = '';
  document.getElementById('loginGate').style.display = 'none';
  mainAppEl.classList.add('active');

  // ── Strategia stats zero-latency ────────────────────────────────────────
  // CASO A: Cache presente (utente di ritorno) → applica subito, zero latenza.
  // CASO B: Cache assente (localStorage svuotato / primo accesso) →
  //         fetch sincrono GAS PRIMA di chiamare initApp, così le card
  //         mostrano i valori reali al primo render. Mai "—".
  const cachedStats = loadStatsCache();
  if (cachedStats) {
    // Applica immediatamente: valori reali visibili dal primo frame
    applyDashboardStats(cachedStats);
    // initApp NON aspetta — può partire subito
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      initApp();
    } else {
      document.addEventListener('DOMContentLoaded', initApp);
    }
  } else {
    // Nessuna cache: fetch real-time PRIMA di mostrare la dashboard
    if (typeof GAS_URL !== 'undefined' && GAS_URL && !GAS_URL.includes('YOUR_GAS')) {
      try {
        const r = await fetch(`${GAS_URL}?action=get_dashboard_stats`);
        if (r.ok) {
          const d = await r.json();
          if (d && d.success) {
            saveStatsCache(d);
            applyDashboardStats(d);
          }
        }
      } catch (_e) { /* GAS non raggiungibile: le card rimarranno con —, ma è raro */ }
    }
    // Avvia l'app dopo il fetch (o subito se GAS non configurato)
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      initApp();
    } else {
      document.addEventListener('DOMContentLoaded', initApp);
    }
  }
})();

/* ═══════════════════════════════════════════
   INIT APP
═══════════════════════════════════════════ */
function initApp() {
  // ── Cache bust: rimuovi tutte le versioni precedenti della cache community ──
  // Questo garantisce che dati statici vecchi non vengano mai caricati dal browser
  // Rimuovi tutte le versioni precedenti di cache (community + stats)
  ['lh360_community_v1', 'lh360_community_v2'].forEach(k => {
    try { localStorage.removeItem(k); } catch(e) {}
  });

  const role = currentUser.role;
  
  // Apply role class to sidebar
  const sidebar = document.getElementById('sidebar');
  sidebar.className = `role-${role === 'team' ? 'team' : role === 'founding' ? 'founding' : 'candidate'}`;

  // Update sidebar user
  const av = document.getElementById('sidebarAvatar');
  av.textContent = currentUser.initial;
  const statusDot = document.createElement('div');
  statusDot.className = 'status-dot';
  av.appendChild(statusDot);
  document.getElementById('sidebarName').textContent = currentUser.name;
  const roleEl = document.getElementById('sidebarRole');
  roleEl.textContent = currentUser.title;
  roleEl.className = 'user-role-sm ' + (role === 'team' ? 'gold' : role === 'founding' ? 'green' : 'amber');

  // Header badge
  const badge = document.getElementById('headerBadge');
  if (role === 'team') {
    badge.textContent = '⬡ Team LuxHaven360';
    badge.className = 'level-badge team';
  } else if (role === 'founding') {
    badge.textContent = '★ Founding Member';
    badge.className = 'level-badge founding';
  } else {
    badge.textContent = '◈ Founder Candidate';
    badge.className = 'level-badge candidate';
  }

  // Show/hide listings nav items
  if (role === 'team' || role === 'founding') {
    document.querySelector('.nav-item.member-plus[onclick*="listings"]') && 
    (document.querySelector('.nav-item.member-plus[onclick*="listings"]').style.display = 'flex');
    document.getElementById('listingsLockedNav') && 
    (document.getElementById('listingsLockedNav').style.display = 'none');
  } else {
    const memberListingNav = document.querySelector('.nav-item.member-plus[onclick*="listings"]');
    if (memberListingNav) memberListingNav.style.display = 'none';
    const lockedNav = document.getElementById('listingsLockedNav');
    if (lockedNav) lockedNav.style.display = 'flex';
  }

  // Last login time
  const now = new Date();
  document.getElementById('lastLoginTime').textContent = `Accesso: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  // Dashboard
  document.getElementById('dashWelcome').textContent = `Benvenuto, ${currentUser.name.split(' ')[0]}`;
  renderDashboard();
  renderFeed();
  renderDiscussions();
  renderListings();
  renderSurveys();
  renderNotifications();
  renderProfile();
  renderMembersTable();
  renderModeration();
  renderRightPanel();
  renderNotifDropdown();
  renderWeeklyChart();

  // Pre-carica conversazioni dalla cache locale — zero latenza
  const _initConvsCache = loadConvsCache();
  if (_initConvsCache && _initConvsCache.length > 0) {
    REAL_CONVS = _initConvsCache;
  }
  renderConversations();
  // notifCount è 0 e NOTIFICATIONS è vuoto → campanella priva di badge
  updateNotifBadge();

  // Simulate real-time activity
  // Avvia presenza real-time: heartbeat immediato + timer + Firebase
  startPresenceSystem();

  // Supabase: ascolta notifiche in tempo reale
  if (_sbReady && currentUser) {
    const notifKey = emailKey(currentUser.email);
    sbOff('notifications_rt');
    const notifCh = _sb.channel('notifications_rt_' + notifKey)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'notifications',
        filter: `user_email=eq.${currentUser.email.toLowerCase()}`
      }, (payload) => {
        const n = payload.new;
        if (!n || !n.text) return;
        const alreadyIn = NOTIFICATIONS.some(x => x.id === n.id);
        if (alreadyIn) return;
        const notif = {
          id:    n.id,
          icon:  n.icon  || 'blue',
          emoji: n.emoji || '🔔',
          text:  n.text,
          time:  'Ora',
          read:  false
        };
        NOTIFICATIONS.unshift(notif);
        notifCount++;
        updateNotifBadge();
        renderNotifDropdown();
        renderNotifications();
        showToast(notif.icon, notif.emoji, notif.text);
      }).subscribe();
    _sbChannels['notifications_rt'] = notifCh;

    // Ascolta attività community in tempo reale (feed attività dashboard)
    sbOff('community_activity');
    const actCh = _sb.channel('community_activity_rt')
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'community_activity'
      }, (payload) => {
        const a = payload.new;
        if (!a || !a.text) return;
        // Non mostrare l'attività dell'utente corrente (già loggata localmente)
        if (currentUser && a.user_email && a.user_email.toLowerCase() === currentUser.email.toLowerCase()) return;
        logActivity(a.dot_color || 'blue', a.text);
      }).subscribe();
    _sbChannels['community_activity'] = actCh;
  }

  // Carica notifiche dalla cache locale (persistenza cross-sessione)
  _loadNotifCache();

  // Carica statistiche dinamiche ogni 10 secondi (aggiornamento in tempo reale)
  loadDashboardStats();
  if (_dashStatsTimer) clearInterval(_dashStatsTimer);
  _dashStatsTimer = setInterval(loadDashboardStats, 10 * 1000);

  // Carica dati community (post, discussioni, sondaggi, presenza, eventi) da GAS
  initCommunityData();

  // Gestisci link diretto a un post (#post-ID nella URL)
  handlePostAnchor();
}

function showPanel(id, navEl) {
  // Blocca pannelli admin per ruoli non-team
  const adminPanels = ['broadcast', 'members', 'moderation', 'analytics'];
  if (adminPanels.includes(id) && currentUser && currentUser.role !== 'team') {
    showToast('red', '\uD83D\uDD12', 'Accesso non autorizzato.');
    return;
  }
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
  
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (navEl) navEl.classList.add('active');

  const titles = {
    dashboard:'Dashboard', feed:'Feed Aggiornamenti', discussions:'Discussioni',
    messages:'Messaggi', listings:'Listing Esclusivi', surveys:'Sondaggi & Feedback',
    notifications:'Centro Notifiche', profile:'Il Mio Profilo',
    members:'Gestione Membri', broadcast:'Comunicazioni', moderation:'Moderazione', analytics:'Analytics'
  };
  document.getElementById('headerTitle').textContent = titles[id] || id;

  // Clear badges when viewing
  if (id === 'notifications') { notifCount = 0; updateNotifBadge(); }
  if (id === 'messages') {
    unreadMsgs = 0; updateMsgBadge();
    // Carica conv solo se lista vuota o non ancora sincronizzata con Supabase
    if (REAL_CONVS.length === 0) {
      loadConversations();
    } else {
      // Lista già presente — sincronizza silenziosamente in background
      loadConversations();
    }
    // Supabase gestisce i messaggi in RT
    if (_sbReady) {
      sbListenConversations();
      if (currentConvPartnerEmail) {
        sbListenMessages(currentConvPartnerEmail);
        sbListenTyping(currentConvPartnerEmail);
      }
    } else {
      startMessagePolling();
    }
  } else {
    stopMessagePolling();
    // Rilascia i canali Supabase messaggistica quando esci dalla sezione
    if (_sbReady) {
      sbOff('messages');
      sbOff('typing');
    }
  }
  if (id === 'feed') {
    document.getElementById('feedBadge').classList.add('hidden');
    // Avvia/riavvia il tracking lettura post quando il feed diventa visibile
    requestAnimationFrame(() => initFeedReadTracking());
  }
  if (id === 'discussions') {
    // Azzera badge nuove discussioni
    const discBadge = document.getElementById('discBadge');
    if (discBadge) { discBadge.textContent = '0'; discBadge.classList.add('hidden'); }
  }
  if (id === 'dashboard') { renderActivityFeed(); renderFeedPreview(); loadDashboardStats(); }
  if (id === 'profile') {
    // Rirenderi il profilo con statistiche aggiornate in tempo reale
    renderProfile();
  }
  if (id === 'broadcast' && currentUser && currentUser.role === 'team') {
    renderEventsAdminList();
  }
}

const COMMUNITY_CACHE_KEY  = 'lh360_community_v3';
const COMMUNITY_CACHE_TTL  = 5 * 60 * 1000; // 5 minuti (solo per posts/discussions)
const EVENTS_CACHE_KEY     = 'lh360_events_v1'; // cache eventi separata, senza TTL
const ONLINE_CACHE_KEY     = 'lh360_online_v1'; // cache membri online, TTL breve (60s)
const CONVS_CACHE_KEY      = 'lh360_convs_v2';  // FIX: cache conversazioni per caricamento immediato
let _communityPollTimer    = null;

function saveCommunityCache() {

      ts:           Date.now(),
      posts:        FEED_POSTS,
      discussions:  DISCUSSIONS,
      threadMsgs:   THREAD_MESSAGES,
      surveys:      SURVEYS,
      listings:     LISTINGS
    }));
  } catch(e) {}
}

/* Salva gli eventi in una cache dedicata senza TTL — devono essere sempre disponibili */
function saveEventsCache() {
  try {
    localStorage.setItem(EVENTS_CACHE_KEY, JSON.stringify({ events: EVENTS }));
  } catch(e) {}
}

function loadEventsCache() {
  try {
    const raw = localStorage.getItem(EVENTS_CACHE_KEY);
    if (!raw) return null;
    return JSON.parse(raw).events || null;
  } catch(e) { return null; }
}

function saveOnlineCache() {
  try { localStorage.setItem(ONLINE_CACHE_KEY, JSON.stringify({ ts: Date.now(), members: ONLINE_MEMBERS })); } catch(e) {}
}

/* FIX: Cache locale conversazioni — caricamento immediato senza attendere GAS/Firebase */
function saveConvsCache() {
  try {
    if (!currentUser || REAL_CONVS.length === 0) return;
    localStorage.setItem(CONVS_CACHE_KEY, JSON.stringify({ ts: Date.now(), email: currentUser.email, convs: REAL_CONVS }));
  } catch(e) {}
}

function loadConvsCache() {
  try {
    const raw = localStorage.getItem(CONVS_CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    // Verifica che la cache appartenga all'utente corrente
    if (!currentUser || obj.email !== currentUser.email) return null;
    // TTL 10 minuti — abbastanza lungo da coprire il caricamento GAS
    if (Date.now() - obj.ts > 10 * 60 * 1000) return null;
    return obj.convs || null;
  } catch(e) { return null; }
}

function loadOnlineCache() {
  try {
    const raw = localStorage.getItem(ONLINE_CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    // FIX: TTL esteso a 5 minuti — mostra subito i membri della sessione precedente
    // mentre Firebase stabilisce la connessione (~1-2s). Firebase aggiorna poi in tempo reale.
    if (Date.now() - obj.ts > 5 * 60 * 1000) return null;
    return obj.members || null;
  } catch(e) { return null; }
}

function loadCommunityCache() {
  try {
    const raw = localStorage.getItem(COMMUNITY_CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (Date.now() - obj.ts > COMMUNITY_CACHE_TTL) return null;
    return obj;
  } catch(e) { return null; }
}

/* Applica i dati GAS in memoria + ri-renderizza le sezioni visibili */
function applyRemoteData(data) {
  if (!data) return;

  // ── Post del feed ───────────────────────────────────────────────
  // Sempre sovrascrive — nessun fallback su dati statici
  if (data.hasOwnProperty('posts') && Array.isArray(data.posts)) {
    const likedSet = new Set(FEED_POSTS.filter(p => p.liked).map(p => p.id));
    FEED_POSTS = data.posts.map(p => ({
      ...p,
      liked:       likedSet.has(p.id) || (p.likedBy && currentUser && p.likedBy.includes(currentUser.name)),
      commentsData: p.commentsData || []
    }));
  }

  // ── Discussioni ──────────────────────────────────────────────────
  // Sempre sovrascrive — se GAS risponde con array vuoto, DISCUSSIONS è [] (nessun fallback statico)
  if (data.hasOwnProperty('discussions') && Array.isArray(data.discussions)) {
    DISCUSSIONS = data.discussions;
  }

  // ── Listing Esclusivi ─────────────────────────────────────────────
  if (Array.isArray(data.listings)) {
    LISTINGS = data.listings;
  }

  // ── Risposte thread ──────────────────────────────────────────────
  if (data.replies && typeof data.replies === 'object') {
    Object.keys(data.replies).forEach(discId => {
      const id = parseInt(discId, 10) || discId;
      THREAD_MESSAGES[id] = data.replies[discId];
    });
  }

  // ── Sondaggi da GAS (sovrascrive sempre — nessun fallback statico) ─
  if (Array.isArray(data.surveys)) {
    SURVEYS = data.surveys;
  }

  // ── Voti sondaggi ────────────────────────────────────────────────
  if (data.votes && typeof data.votes === 'object') {
    SURVEYS.forEach(s => {
      const key = 'survey_' + s.id;
      if (data.votes[key]) {
        const v = data.votes[key];
        // Aggiorna conteggi opzioni
        Object.keys(v.options || {}).forEach(idx => {
          if (s.options[idx]) s.options[idx].votes = v.options[idx];
        });
        s.total = s.options.reduce((sum, o) => sum + o.votes, 0);
        if (currentUser && v.voters && v.voters.includes(currentUser.name)) {
          s.voted = true;
        }
      }
    });
  }

  saveCommunityCache();

  // ── Rilevamento nuovi contenuti → notifiche reali ────────────────────────
  // Esegui solo dopo il primo caricamento (evita notifiche spurie all'avvio)
  if (_communityDataReady) {
    _detectNewContentAndNotify(data);
  } else {
    // Primo caricamento: inizializza gli snapshot di riferimento
    _initContentSnapshots();
    _communityDataReady = true;
  }

  // Re-renderizza solo i pannelli visibili
  const activePanel = document.querySelector('.panel.active');
  if (!activePanel) return;
  const pid = activePanel.id.replace('panel-', '');
  if (pid === 'feed')        renderFeed();
  if (pid === 'discussions') renderDiscussions();
  if (pid === 'surveys')     renderSurveys();
  if (pid === 'listings')    renderListings();
  if (pid === 'dashboard')   {
    // Se il log locale è vuoto, costruisci attività dai dati reali disponibili
    try {
      const raw = localStorage.getItem('lh360_activity_log');
      const logEmpty = !raw || JSON.parse(raw).length === 0;
      if (logEmpty) _buildActivityFromRealData();
    } catch(_e) { _buildActivityFromRealData(); }
    renderActivityFeed();
    renderFeedPreview();
  }
}

/* Carica dati community da GAS (o cache se fresca) */
async function initCommunityData() {
  if (!currentUser) return;

  // 1a. Carica eventi dalla cache dedicata SUBITO — rendering immediato senza latenza
  const cachedEvents = loadEventsCache();
  if (cachedEvents && cachedEvents.length > 0) {
    applyEventsData(cachedEvents);
  }

  // 1b. Carica membri online dalla cache SUBITO (TTL 60s)
  const cachedOnline = loadOnlineCache();
  if (cachedOnline && cachedOnline.length > 0) {
    applyPresenceData(cachedOnline);
  }

  // 1c. Applica cache community (posts, discussions, ecc.)
  const cache = loadCommunityCache();
  if (cache) {
    applyRemoteData({
      posts:       cache.posts,
      discussions: cache.discussions,
      replies:     cache.threadMsgs || {},
      votes:       {},
      listings:    cache.listings || []
    });
  }

  // 2. Fetch completo da GAS — aspetta prima che il heartbeat sia registrato
  if (!GAS_URL) return;
  try {
    await sendHeartbeat(); // assicura che il server ci conosca prima di chiedere chi è online
    // Fetch presenza immediata in parallelo dopo heartbeat
    fetch(GAS_URL+'?action=get_presence').then(r=>r.json()).then(p=>{ if(p.success&&Array.isArray(p.online)) applyPresenceData(p.online); }).catch(()=>{});
    const data = await fetch(`${GAS_URL}?action=get_community_data`).then(r => r.json());
    if (data.success) {
      applyRemoteData(data);
      if (Array.isArray(data.online)) applyPresenceData(data.online);
      if (Array.isArray(data.events)) { applyEventsData(data.events); saveEventsCache(); }
    }
  } catch(e) {
    console.warn('[CommunityData] GAS non raggiungibile:', e.message);
    renderRightPanel();
  }

  // 3. Polling real-time ogni 3 secondi (presenza e notifiche) + 15s per contenuti pesanti
  if (_communityPollTimer) clearInterval(_communityPollTimer);
  _communityPollTimer = setInterval(pollCommunityUpdates, 3 * 1000);
}

/* Polling leggero: solo metadati per evitare render inutili */
let _pollCycle = 0;
async function pollCommunityUpdates() {
  if (!GAS_URL || !currentUser) return;
  _pollCycle++;
  try {
    const data = await fetch(`${GAS_URL}?action=get_community_data`).then(r => r.json());
    if (data.success) {
      // Presenza real-time: aggiorna lista membri online
      if (Array.isArray(data.online)) applyPresenceData(data.online);
      // Eventi: aggiorna e persisti in cache — ogni ciclo (5s)
      if (Array.isArray(data.events)) applyEventsData(data.events);
      // Notifiche in tempo reale
      if (Array.isArray(data.notifications)) {
        NOTIFICATIONS.length = 0;
        data.notifications.forEach(n => NOTIFICATIONS.push(n));
        notifCount = NOTIFICATIONS.filter(n => n.unread).length;
        updateNotifBadge();
        renderNotifDropdown();
        const notifPanel = document.getElementById('panel-notifications');
        if (notifPanel && notifPanel.classList.contains('active')) renderNotifications();
      }
      // Ogni 3 cicli (≈15s): aggiorna anche posts/discussions (più pesante)
      // Posts/discussions ogni 5 cicli (≈15s) — presenza aggiornata ogni ciclo (3s)
      if (_pollCycle % 5 === 0) {
        applyRemoteData(data);
        // Se il dashboard è attivo, ricostruisci activity se log è scarso
        const dashActive = document.getElementById('panel-dashboard')?.classList.contains('active');
        if (dashActive) {
          try {
            const raw = localStorage.getItem('lh360_activity_log');
            const logLen = raw ? JSON.parse(raw).length : 0;
            if (logLen < 3) _buildActivityFromRealData();
          } catch(_e) {}
        }
      }
    }
  } catch(e) {}
  // Statistiche dashboard
  try {
    const resp = await fetch(`${GAS_URL}?action=get_dashboard_stats`);
    if (resp.ok) {
      const stats = await resp.json();
      if (stats.success) { saveStatsCache(stats); applyDashboardStats(stats); }
    }
  } catch(e) {}
}

/* Seed disabilitato — contenuti pubblicati solo dal Team tramite pannello Comunicazioni */
async function seedInitialData() {
  console.info('[Seed] Disabilitato.');
  return; // nessun seed automatico
  for (const post of [...FEED_POSTS].reverse()) {
    try {
      await fetch(`${GAS_URL}?action=publish_post` +
        `&author=${encodeURIComponent(post.author)}&initial=${encodeURIComponent(post.initial)}` +
        `&role=${encodeURIComponent(post.role)}&type=${encodeURIComponent(post.type)}` +
        `&title=${encodeURIComponent(post.title)}&text=${encodeURIComponent(post.text)}` +
        `&locked=${encodeURIComponent(post.locked||'')}`);
    } catch(e) {}
  }
  for (const disc of [...DISCUSSIONS].reverse()) {
    const replies = THREAD_MESSAGES[disc.id] || [];
    const op = replies[0];
    if (!op) continue;
    try {
      await fetch(`${GAS_URL}?action=save_discussion` +
        `&category=${encodeURIComponent(disc.category)}&title=${encodeURIComponent(disc.title)}` +
        `&body=${encodeURIComponent(op.text)}&author=${encodeURIComponent(disc.author)}` +
        `&initial=${encodeURIComponent(op.initial||'?')}&role=${encodeURIComponent(op.role||'')}` +
        `&isTeam=${!!op.isTeam}`);
    } catch(e) {}
  }
  console.info('[Seed] Completato.');
}

   LOAD DASHBOARD STATS (cache-first, GAS in background)
═══════════════════════════════════════════ */
let _dashStatsTimer = null;

async function loadDashboardStats() {
  if (!currentUser) return;

  // 1. Mostra subito i valori dalla cache reale (da sessioni precedenti via GAS)
  // Se la cache non esiste (primo accesso assoluto), le card restano con — fino a GAS.
  // Non usiamo mai dati mock: un — neutro è preferibile a un numero sbagliato.
  const cached = loadStatsCache();
  if (cached) {
    applyDashboardStats(cached);
  }

  if (!GAS_URL) return;

  // 2. Aggiorna in background da GAS — l'utente non vede il loading
  try {
    const url = `${GAS_URL}?action=get_dashboard_stats`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (!data.success) throw new Error(data.error || 'Errore');
    saveStatsCache(data);
    applyDashboardStats(data);
  } catch (err) {
    console.warn('[Stats] GAS non raggiungibile:', err.message);
  }
}

/* applyClientSideStats rimossa: usava MEMBERS_DATA mock causando valori falsi visibili.
   I dati reali provengono esclusivamente da GAS (con cache per accessi successivi). */

function applyDashboardStats(data) {
  // ── Membri Attivi ────────────────────────────────────────
  const activeEl = document.getElementById('dashStatActiveMembers');
  if (activeEl) activeEl.textContent = data.active_members ?? '—';

  const changeEl = document.getElementById('dashStatMembersChange');
  if (changeEl) {
    const newW  = data.weekly_new  ?? 0;
    const lostW = data.weekly_lost ?? 0;
    if (newW > 0 || lostW > 0) {
      const sign = newW >= lostW ? '+' : '-';
      const diff = Math.abs(newW - lostW);
      const cls  = newW >= lostW ? 'up' : 'neutral';
      changeEl.className = `stat-change ${cls}`;
      changeEl.innerHTML = newW >= lostW
        ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,6 13.5,15.5 8.5,10.5 1,18"/><polyline points="17,6 23,6 23,12"/></svg> +${newW} questa settimana`
        : `<span>-${lostW} usciti, +${newW} nuovi questa settimana</span>`;
    } else {
      changeEl.className = 'stat-change neutral';
      changeEl.textContent = 'Nessuna variazione questa settimana';
    }
  }

  // ── Aggiornamenti Feed ───────────────────────────────────
  const feedEl = document.getElementById('dashStatFeedUpdates');
  if (feedEl) feedEl.textContent = data.feed_updates_30d ?? '—';

  // ── Founding Members ─────────────────────────────────────
  const foundingEl = document.getElementById('dashStatFoundingCount');
  if (foundingEl) foundingEl.textContent = data.founding_member_count ?? '—';
  const foundingChangeEl = document.getElementById('dashStatFoundingChange');
  if (foundingChangeEl) {
    foundingChangeEl.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,6 13.5,15.5 8.5,10.5 1,18"/><polyline points="17,6 23,6 23,12"/></svg> su ${data.max_founders ?? 200} posti totali`;
  }

  // ── Posti Disponibili ─────────────────────────────────────
  const remaining  = data.remaining_spots ?? 0;
  const maxF       = data.max_founders    ?? 200;
  const totalBooked = maxF - remaining;
  const pct         = Math.min(100, Math.round((totalBooked / maxF) * 100));

  const spotsEl = document.getElementById('dashStatRemainingSpots');
  if (spotsEl) spotsEl.innerHTML = `${remaining} <span class="stat-unit">/ ${maxF}</span>`;

  const spotsLabelEl = document.getElementById('dashStatRemainingLabel');
  if (spotsLabelEl) {
    spotsLabelEl.textContent = remaining === 0 ? 'Tutti i posti esauriti' : 'Slot disponibili';
    spotsLabelEl.className = `stat-change ${remaining < 20 ? 'up' : 'neutral'}`;
  }

  // ── Right Panel Stato Progetto ────────────────────────────
  const rpBooked    = document.getElementById('rpStatusBooked');
  const rpBar       = document.getElementById('rpStatusBar');
  const rpRemaining = document.getElementById('rpStatusRemaining');
  if (rpBooked)    rpBooked.textContent = `${totalBooked} / ${maxF}`;
  if (rpBar)       rpBar.style.width    = `${pct}%`;
  if (rpRemaining) rpRemaining.textContent = `${remaining} posti ancora disponibili`;

  // ── Aggiorna Founder Status Card (per candidati) ──────────
  // Aggiorna il campo "Posti Disponibili" nella founder status card senza re-render completo
  const fsrEl = document.getElementById('founderStatusRemainingSpots');
  if (fsrEl) fsrEl.textContent = `${remaining} rimasti`;
}

/* ═══════════════════════════════════════════
   ACTIVITY LOG (localStorage-based)
═══════════════════════════════════════════ */
const ACTIVITY_LOG_KEY = 'lh360_activity_log';
const ACTIVITY_MAX     = 100;
const ACTIVITY_DAYS    = 14;

function logActivity(dotColor, text) {
  const entry = { dotColor, text, ts: Date.now() };
  try {
    const raw = localStorage.getItem(ACTIVITY_LOG_KEY);
    let log = raw ? JSON.parse(raw) : [];
    log.unshift(entry);
    if (log.length > ACTIVITY_MAX) log = log.slice(0, ACTIVITY_MAX);
    localStorage.setItem(ACTIVITY_LOG_KEY, JSON.stringify(log));
  } catch(e) {}
  // Aggiorna il feed se la dashboard è visibile
  const dashPanel = document.getElementById('panel-dashboard');
  if (dashPanel && dashPanel.classList.contains('active')) renderActivityFeed();
}

function formatTimeAgo(ts) {
  const diff = Date.now() - ts;
  // FIX: timestamp leggermente nel futuro → mostra "Ora"
  if (diff < 0)  return 'Ora';
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(diff / 86400000);
  if (m < 1)  return 'Ora';
  if (m < 60) return m + 'm';
  if (h < 24) return h + 'h';
  return d + 'g';
}

/* ═══════════════════════════════════════════
   RENDER ATTIVITÀ RECENTE (dinamico)
═══════════════════════════════════════════ */
function clearActivityLog() {
  try { localStorage.removeItem(ACTIVITY_LOG_KEY); } catch(e) {}
  renderActivityFeed();
  showToast('blue', '🗑️', 'Attività recente svuotata');
}

function renderActivityFeed() {
  const act = document.getElementById('dashActivity');
  if (!act) return;

  const cutoff = Date.now() - ACTIVITY_DAYS * 24 * 60 * 60 * 1000;
  let activities = [];

  // Leggi dal log persistente
  try {
    const raw = localStorage.getItem(ACTIVITY_LOG_KEY);
    if (raw) {
      activities = JSON.parse(raw)
        .filter(e => e.ts >= cutoff)
        .slice(0, 5)
        .map(e => ({ dot: e.dotColor, text: e.text, time: formatTimeAgo(e.ts) }));
    }
  } catch(e) {}

  // Nessun seed statico — mostra solo attività reali del log persistente

  if (activities.length === 0) {
    act.innerHTML = '<div style="font-size:0.75rem;color:var(--muted2);text-align:center;padding:1rem 0;">Nessuna attività recente.</div>';
    return;
  }

  act.innerHTML = activities.map(a => `
    <div class="activity-item">
      <div class="activity-dot ${a.dot}"></div>
      <div class="activity-text">${a.text}</div>
      <div class="activity-time">${a.time}</div>
    </div>
  `).join('');
}

/* ── Inizializza snapshot contenuti (primo caricamento — no notifiche) ── */
function _initContentSnapshots() {
  FEED_POSTS.forEach(p => {
    if (p.role && (p.role.toLowerCase().includes('team') || p.role.toLowerCase().includes('admin'))) {
      _lastKnownTeamPostIds.add(p.id);
    }
  });
  LISTINGS.forEach(l => _lastKnownListingIds.add(l.id));
  DISCUSSIONS.forEach(d => {
    _lastKnownDiscIds.add(d.id);
    _lastKnownThreadReplies[d.id] = d.replies || 0;
  });
}

/* ── Rileva nuovi contenuti e genera notifiche reali ── */
function _detectNewContentAndNotify(data) {
  // 1. Nuovi post del team → notifica project_updates
  FEED_POSTS.forEach(p => {
    if (!p.role) return;
    const isTeam = p.role.toLowerCase().includes('team') || p.role.toLowerCase().includes('admin');
    if (isTeam && !_lastKnownTeamPostIds.has(p.id)) {
      _lastKnownTeamPostIds.add(p.id);
      addRealNotification('project_updates', '📢',
        `Nuovo aggiornamento del team: <strong>${p.title || 'Annuncio'}</strong>`);
      logActivity('gold', `<strong>Team LH360</strong> ha pubblicato: ${p.title || 'un aggiornamento'}`);
    }
  });

  // 2. Nuove discussioni → notifica new_discussions
  DISCUSSIONS.forEach(d => {
    if (!_lastKnownDiscIds.has(d.id)) {
      _lastKnownDiscIds.add(d.id);
      _lastKnownThreadReplies[d.id] = d.replies || 0;
      // Non notificare se la discussione è dell'utente corrente (già sa che l'ha creata)
      if (currentUser && d.author !== currentUser.name) {
        addRealNotification('new_discussions', '💬',
          `Nuova discussione da <strong>${(d.author||'').split(' ')[0]}</strong>: ${d.title}`);
        logActivity('blue', `<strong>${(d.author||'').split(' ')[0]}</strong> ha avviato: ${d.title}`);
        // Aggiorna badge discussioni nella sidebar
        const discBadge = document.getElementById('discBadge');
        if (discBadge) {
          const curr = parseInt(discBadge.textContent || '0', 10);
          discBadge.textContent = curr + 1;
          discBadge.classList.remove('hidden');
        }
      }
    }
  });

  // 3. Nuove risposte ai thread → notifica discussion_reply (solo thread dell'utente corrente)
  if (currentUser) {
    const myDiscussions = DISCUSSIONS.filter(d => d.author === currentUser.name);
    myDiscussions.forEach(d => {
      const prev = _lastKnownThreadReplies[d.id] || 0;
      const curr = d.replies || 0;
      if (curr > prev) {
        _lastKnownThreadReplies[d.id] = curr;
        addRealNotification('discussion_reply', '💬',
          `Nuova risposta nel tuo thread: <strong>${d.title}</strong>`);
      }
    });
  }

  // 4. Nuovi listing → notifica new_listings
  LISTINGS.forEach(l => {
    if (!_lastKnownListingIds.has(l.id)) {
      _lastKnownListingIds.add(l.id);
      addRealNotification('new_listings', '🏠',
        `Nuova proprietà disponibile: <strong>${l.name || l.city || 'Listing esclusivo'}</strong>`);
      logActivity('gold', `Nuovo listing aggiunto: <strong>${l.name || l.city || 'Proprietà esclusiva'}</strong>`);
    }
  });
}

/* ── Scrivi attività su Supabase community_activity (visibile a tutti) ── */
async function _writeActivityToSupabase(dotColor, text) {
  if (!_sbReady || !currentUser) return;
  try {
    await _sb.from('community_activity').insert({
      user_email: currentUser.email.toLowerCase(),
      user_name:  currentUser.name,
      dot_color:  dotColor,
      text:       text,
      created_at: new Date().toISOString()
    });
  } catch(_e) { /* silenzioso — tabella potrebbe non esistere, logActivity locale è sufficiente */ }
}

/* ── Inizializza attività dalla community real-data (all'avvio) ── */
function _buildActivityFromRealData() {
  const allActivities = [];
  const now = Date.now();

  // Ultimi post del team
  FEED_POSTS
    .filter(p => p.role && (p.role.toLowerCase().includes('team') || p.role.toLowerCase().includes('admin')))
    .slice(0, 3)
    .forEach(p => {
      const authorName = (p.author || 'Team').split(' ')[0];
      allActivities.push({
        dotColor: 'gold',
        text: `<strong>${authorName}</strong> ha pubblicato: ${p.title || 'un aggiornamento'}`,
        ts: p.ts ? new Date(p.ts).getTime() : now - 3600000
      });
    });

  // Ultime discussioni
  DISCUSSIONS.slice(0, 3).forEach(d => {
    const authorName = (d.author || 'Membro').split(' ')[0];
    allActivities.push({
      dotColor: 'blue',
      text: `<strong>${authorName}</strong> ha avviato: ${d.title}`,
      ts: now - 7200000
    });
  });

  // Ordina per ts decrescente e prendi i 5 più recenti
  allActivities.sort((a, b) => b.ts - a.ts);
  allActivities.slice(0, 5).forEach(a => logActivity(a.dotColor, a.text));
}

function toggleLike(postId, btn) {
  const post = FEED_POSTS.find(p => p.id === postId);
  if (!post) return;

  // Ottimistic update immediato
  post.liked  = !post.liked;
  post.likes += post.liked ? 1 : -1;

  btn.className = `post-action-btn ${post.liked ? 'liked' : ''}`;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="${post.liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg> ${post.liked ? 'Liked' : 'Mi piace'} (${post.likes})`;

  // Sincronizza reaction-bar (indicatori riassuntivi ❤️ 💬)
  const reactLikes = document.getElementById('react-likes-' + postId);
  if (reactLikes) reactLikes.textContent = '❤️ ' + post.likes;

  if (post.liked) showToast('red', '❤️', 'Hai messo like al post!');

  // Persisti su GAS in background
  if (GAS_URL && currentUser) {
    const url = `${GAS_URL}?action=toggle_post_like&postId=${postId}&userName=${encodeURIComponent(currentUser.name)}`;
    fetch(url).then(r => r.json()).then(data => {
      // Correggi con il dato reale dal server (in caso di race condition)
      if (data.success) {
        post.likes = data.likes;
        post.liked = data.liked;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="${post.liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg> ${post.liked ? 'Liked' : 'Mi piace'} (${post.likes})`;
        if (reactLikes) reactLikes.textContent = '❤️ ' + post.likes;
      }
    }).catch(() => {}); // Fallback: mantieni ottimistic
  }
}

function toggleComments(postId) {
  const el = document.getElementById('comments-' + postId);
  if (el) el.classList.toggle('open');
}

function submitComment(e, postId) { if(e.key==='Enter') submitCommentBtn(postId, e.target); }
function submitCommentBtn(postId, inputEl) {
  const input = inputEl || document.querySelector(`#comments-${postId} .comment-input`);
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  const post = FEED_POSTS.find(p => p.id === postId);
  if (!post) return;

  const shortName = currentUser.name.split(' ')[0] + ' ' + (currentUser.name.split(' ')[1]||'?')[0] + '.';
  const newComment = { author: shortName, initial: currentUser.initial, text, time: 'Ora' };

  // Ottimistic update immediato
  post.commentsData.push(newComment);
  post.comments = post.commentsData.length;
  input.value = '';

  // Aggiorna contatori in entrambi i punti (pulsante + reaction-bar)
  const commentBtn = document.querySelector(`#post-${postId} .post-action-btn:nth-child(2)`);
  if (commentBtn) commentBtn.innerHTML = commentBtn.innerHTML.replace(/\(\d+\)/, `(${post.comments})`);
  const reactComments = document.getElementById('react-comments-' + postId);
  if (reactComments) reactComments.textContent = '💬 ' + post.comments;

  // Render solo i commenti (evita re-render completo del feed)
  const commentsContainer = document.getElementById('comments-' + postId);
  if (commentsContainer) {
    renderPostComments(post, commentsContainer);
    commentsContainer.classList.add('open');
  }
  showToast('green', '💬', 'Commento pubblicato!');
  logActivity('green', `<strong>${currentUser.name.split(' ')[0]}</strong> ha commentato nel feed`);
  // Scrivi attività su Supabase (visibile agli altri membri in tempo reale)
  _writeActivityToSupabase('green', `<strong>${currentUser.name.split(' ')[0]}</strong> ha commentato nel feed`);

  // Se il post è di un altro utente, invia notifica tramite GAS (post_replies)
  if (post.author && post.author !== currentUser.name && GAS_URL) {
    fetch(`${GAS_URL}?action=notify_post_comment` +
      `&postId=${postId}&commenter=${encodeURIComponent(currentUser.name)}` +
      `&postAuthor=${encodeURIComponent(post.author)}&postTitle=${encodeURIComponent(post.title||'')}`
    ).catch(() => {});
  }
  const profComments = document.getElementById('profileStatComments');
  if (profComments) profComments.textContent = countUserComments();

  // Persisti su GAS in background
  if (GAS_URL && currentUser) {
    const url = `${GAS_URL}?action=add_post_comment&postId=${postId}` +
      `&author=${encodeURIComponent(shortName)}&initial=${encodeURIComponent(currentUser.initial)}` +
      `&text=${encodeURIComponent(text)}`;
    fetch(url).catch(() => {});
  }
}

function renderPostComments(post, container) {
  const rows = post.commentsData.map(c => `
    <div class="comment">
      <div class="comment-avatar">${c.initial}</div>
      <div class="comment-bubble">
        <div class="comment-author">${c.author}</div>
        <div class="comment-text">${c.text}</div>
        <div class="comment-time">${c.time}</div>
      </div>
    </div>

  const inputRow = `
    <div class="comment-input-row">
      <div class="comment-avatar" style="margin-top:0;">${currentUser.initial}</div>
      <input class="comment-input" placeholder="Scrivi un commento…" onkeydown="submitComment(event, ${post.id})"/>
      <button class="comment-send-btn" onclick="submitCommentBtn(${post.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>

}

    <span class="thread-category ${thread.category}">${catLabels[thread.category] || thread.category}</span>

  `;
  document.getElementById('threadDetailTitle').textContent = thread.title;
  document.getElementById('threadDetailInfo').innerHTML = `
    <span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>

    </span>

}

function renderThreadMessages(id) {
  const messages = THREAD_MESSAGES[id] || [];
  const container = document.getElementById('threadDetailMessages');
  container.innerHTML = '';

  if (messages.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;">Nessun messaggio ancora. Sii il primo a rispondere!</div>`;
    return;
  }

  messages.forEach((msg, idx) => {
    const div = document.createElement('div');
    div.className = `thread-message${msg.isOp ? ' op' : ''}`;
    div.innerHTML = `
      <div class="thread-msg-avatar ${msg.isTeam ? 'team' : ''}">${msg.initial}</div>
      <div class="thread-msg-body">
        <div class="thread-msg-header">
          <span class="thread-msg-author ${msg.isTeam ? 'team-author' : ''}">${msg.author}</span>
          <span class="thread-msg-role">${msg.role}</span>
          <span class="thread-msg-time">${msg.time}</span>
        </div>
        <div class="thread-msg-text">${msg.text}</div>
        <div class="thread-msg-reactions">
          ${(msg.reactions || []).map(r => `<div class="thread-reaction">${r}</div>`).join('')}
        </div>
      </div>
    `;
    container.appendChild(div);

    if (idx === 0 && messages.length > 1) {
      const div2 = document.createElement('div');
      div2.className = 'thread-divider';
      div2.innerHTML = '<span>Risposte</span>';
      container.appendChild(div2);
    }
  });

  container.scrollTop = container.scrollHeight;
}

function closeThread() {
  document.getElementById('threadOverlay').classList.remove('open');
  document.body.style.overflow = '';

  document.getElementById('threadComposeInput').value = '';
}

function handleThreadKey(e) {

}

async function submitThreadReply() {
  const input = document.getElementById('threadComposeInput');
  const text  = input.value.trim();
  if (!text || !currentThreadId) return;

  const shortName = currentUser.name.split(' ')[0] + ' ' + (currentUser.name.split(' ')[1]||'?')[0] + '.';
  const newReply  = {
    author: shortName, initial: currentUser.initial,
    role: currentUser.title, isTeam: currentUser.role === 'team',
    time: 'Ora', text, isOp: false, reactions: []
  };

  // Ottimistic update
  if (!THREAD_MESSAGES[currentThreadId]) THREAD_MESSAGES[currentThreadId] = [];
  THREAD_MESSAGES[currentThreadId].push(newReply);

  const thread = DISCUSSIONS.find(d => d.id === currentThreadId);
  if (thread) { thread.replies++; thread.lastReply = `${currentUser.name.split(' ')[0]} · Ora`; }

  input.value = '';
  renderThreadMessages(currentThreadId);
  renderDiscussions();
  showToast('green', '💬', 'Risposta pubblicata con successo!');
  logActivity('blue', `<strong>${currentUser.name.split(' ')[0]}</strong> ha risposto in una discussione`);
  // Scrivi attività su Supabase (visibile agli altri in tempo reale)
  const _threadTitle = DISCUSSIONS.find(d => d.id === currentThreadId)?.title || 'una discussione';
  _writeActivityToSupabase('blue', `<strong>${currentUser.name.split(' ')[0]}</strong> ha risposto in: ${_threadTitle}`);

  // Notifica il creatore del thread (se diverso dall'utente corrente) tramite GAS
  const _threadOwner = DISCUSSIONS.find(d => d.id === currentThreadId);
  if (_threadOwner && _threadOwner.author !== currentUser.name && GAS_URL) {
    fetch(`${GAS_URL}?action=notify_thread_reply` +
      `&threadId=${currentThreadId}&replier=${encodeURIComponent(currentUser.name)}` +
      `&threadAuthor=${encodeURIComponent(_threadOwner.author)}&threadTitle=${encodeURIComponent(_threadOwner.title||'')}`
    ).catch(() => {});
  }

  // Persisti su GAS
  if (GAS_URL && currentUser) {
    try {
      const url = `${GAS_URL}?action=add_reply` +
        `&discId=${currentThreadId}&author=${encodeURIComponent(shortName)}` +
        `&initial=${encodeURIComponent(currentUser.initial)}&role=${encodeURIComponent(currentUser.title)}` +
        `&text=${encodeURIComponent(text)}&isTeam=${currentUser.role === 'team'}`;
      await fetch(url);
      saveCommunityCache();
    } catch(e) { console.warn('[Reply] GAS error:', e.message); }
  }
}

/* ── Formatta timestamp ISO in label leggibile ── */
function formatMsgTime(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    if (isNaN(d.getTime())) return '';
    const now = new Date();
    const diffMs = now - d;
    // FIX: se diffMs < 0 il messaggio ha timestamp leggermente nel futuro
    // (sfasamento clock server/client o timezone UTC vs locale) → mostra ora reale
    if (diffMs < 0) return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffDays === 0) return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    if (diffDays === 1) return 'Ieri';
    if (diffDays < 7) return diffDays + ' gg fa';
    return d.toLocaleDateString('it-IT', { day:'2-digit', month:'short' });
  } catch(_e) { return ''; }
}

/* ── Trova info partner dagli online members o dal suo email ── */
function getPartnerInfo(partnerEmail) {
  // Prima cerca tra i membri online
  const onlineMember = ONLINE_MEMBERS.find(m => m.email && m.email.toLowerCase() === partnerEmail.toLowerCase());
  if (onlineMember) {
    return { name: onlineMember.name, initial: onlineMember.initial || onlineMember.name[0].toUpperCase(), role: onlineMember.role, status: 'online' };
  }
  // Cerca nella lista conv (per i dati già salvati)
  const conv = REAL_CONVS.find(c => c.partnerEmail.toLowerCase() === partnerEmail.toLowerCase());
  if (conv) {
    return { name: conv.partnerName, initial: conv.partnerInitial, role: conv.partnerRole, status: 'offline' };
  }
  // Fallback: ricava initial dall'email
  const parts = partnerEmail.split('@')[0].split('.');
  const name = parts.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ');
  return { name, initial: name[0] || '?', role: '', status: 'offline' };
}

/* ── Carica conversazioni da GAS ── */
async function loadConversations() {
  // FIX: carica subito dalla cache locale — zero latenza, UI reattiva istantaneamente
  const cachedConvs = loadConvsCache();
  if (cachedConvs && cachedConvs.length > 0 && REAL_CONVS.length === 0) {
    REAL_CONVS = cachedConvs;
    renderConversations();
  }

  // Se Supabase è pronto, il listener sbListenConversations() gestisce gli aggiornamenti RT
  if (!GAS_URL || !currentUser) {
    if (_sbReady) sbListenConversations();
    return;
  }
  try {
    const resp = await fetch(`${GAS_URL}?action=get_conversations&email=${encodeURIComponent(currentUser.email)}`);
    const data = await resp.json();
    if (data.success && Array.isArray(data.conversations)) {
      REAL_CONVS = data.conversations.map(c => {
        const info = getPartnerInfo(c.partnerEmail);
        return {
          partnerEmail: c.partnerEmail,
          partnerName: c.partnerName || info.name,
          partnerInitial: c.partnerInitial || info.initial,
          partnerRole: c.partnerRole || info.role,
          lastMessage: c.lastMessage || '',
          lastTs: c.lastTs || '',
          unread: currentConvPartnerEmail && c.partnerEmail.toLowerCase() === currentConvPartnerEmail.toLowerCase() ? 0 : (c.unread || 0)
        };
      });
      // Preserva la conv attiva se non ancora sul server (nessun messaggio inviato)
      if (currentConvPartnerEmail) {
        const _activeInList = REAL_CONVS.some(c => c.partnerEmail.toLowerCase() === currentConvPartnerEmail.toLowerCase());
        if (!_activeInList) {
          const _pi = getPartnerInfo(currentConvPartnerEmail);
          REAL_CONVS.unshift({ partnerEmail: currentConvPartnerEmail, partnerName: _pi.name, partnerInitial: _pi.initial, partnerRole: _pi.role, lastMessage: '', lastTs: new Date().toISOString(), unread: 0 });
        }
      }
      saveConvsCache(); // FIX: persisti per caricamento istantaneo al prossimo accesso
      renderConversations();
      // Aggiorna badge messaggi
      const totalUnread = REAL_CONVS.reduce((s, c) => s + (c.unread || 0), 0);
      const badge = document.getElementById('msgNavBadge');
      if (badge) {
        badge.textContent = totalUnread > 0 ? totalUnread : '';
        badge.style.display = totalUnread > 0 ? '' : 'none';
      }
    }
  } catch(e) { console.warn('[Messages] loadConversations error:', e.message); }

  // Avvia il listener Supabase per aggiornamenti RT sulle conversazioni
  if (_sbReady) sbListenConversations();
}

/* ── Renderizza lista conversazioni ── */
function renderConversations() {
  const container = document.getElementById('convListContainer');
  if (!container) return;

  const query = (document.querySelector('.conv-search-input')?.value || '').toLowerCase();
  const convs = query
    ? REAL_CONVS.filter(c => (c.partnerName||'').toLowerCase().includes(query))
    : REAL_CONVS;

  if (convs.length === 0) {
    container.innerHTML = `
      <div class="conv-empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <div class="conv-empty-text">${query ? 'Nessun risultato per "' + query + '"' : 'Non ci sono conversazioni recenti.'}</div>
      </div>`;
    return;
  }

  container.innerHTML = convs.map(c => {
    const isActive = currentConvPartnerEmail && c.partnerEmail.toLowerCase() === currentConvPartnerEmail.toLowerCase();
    const isTeam = c.partnerRole === 'team';
    const onlineM = ONLINE_MEMBERS.find(m => (m.email && m.email.toLowerCase() === c.partnerEmail.toLowerCase()) || (m.name && c.partnerName && m.name.toLowerCase() === c.partnerName.toLowerCase()));
    const status = onlineM ? 'online' : 'offline';
    const isTyping = !!_typingByEmail[c.partnerEmail.toLowerCase()];
    const previewHtml = isTyping
      ? `<div class="conv-preview" style="color:var(--gold);font-style:italic;">Sta scrivendo<span class="conv-typing-dots"><span>.</span><span>.</span><span>.</span></span></div>`
      : `<div class="conv-preview">${c.lastMessage || '—'}</div>`;
    return `
    <div class="conv-item ${isActive ? 'active' : ''}" onclick="openConvByEmail('${c.partnerEmail}')">
      <div class="conv-avatar" style="${isTeam ? 'border-color:var(--gold-dim);color:var(--gold);' : ''}">
        ${c.partnerInitial}
        <div class="om-status ${status}" style="position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;background:${status==='online'?'var(--green)':'var(--dark4)'};border:2px solid var(--dark3);"></div>
      </div>
      <div class="conv-info">
        <div class="conv-name">${c.partnerName}</div>
        ${previewHtml}
      </div>
      <div class="conv-meta">
        <div class="conv-time">${formatMsgTime(c.lastTs)}</div>
        ${c.unread > 0 ? `<div class="conv-unread">${c.unread}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ── Apri conversazione per email partner ── */
async function openConvByEmail(partnerEmail) {
  // Se si apre una conv diversa da quella attiva, resetta il tracking
  if (_activeListenPartner && _activeListenPartner.toLowerCase() !== partnerEmail.toLowerCase()) {
    _activeListenPartner = null;
  }
  currentConvPartnerEmail = partnerEmail;
  const partnerInfo = getPartnerInfo(partnerEmail);

  // Aggiorna header
  const headerAvatar = document.getElementById('chatHeaderAvatar');
  if (headerAvatar) {
    headerAvatar.textContent = partnerInfo.initial;
    headerAvatar.style.borderColor = partnerInfo.role === 'team' ? 'var(--gold-dim)' : '';
    headerAvatar.style.color = partnerInfo.role === 'team' ? 'var(--gold)' : '';
  }
  document.getElementById('chatHeaderName').textContent = partnerInfo.name;
  const statusEl = document.getElementById('chatHeaderStatus');
  if (statusEl) {
    const onlineM = ONLINE_MEMBERS.find(m =>
      (m.email && m.email.toLowerCase() === partnerEmail.toLowerCase()) ||
      (m.name && partnerInfo.name && m.name.toLowerCase() === partnerInfo.name.toLowerCase())
    );
    statusEl.textContent = onlineM ? '● Online' : '○ Offline';
    statusEl.className = 'chat-header-status ' + (onlineM ? '' : 'offline');
  }

  // Marca conv come letta
  const conv = REAL_CONVS.find(c => c.partnerEmail.toLowerCase() === partnerEmail.toLowerCase());
  if (conv) conv.unread = 0;
  renderConversations();

  // FIX schermata nera: se Supabase è pronto, carica direttamente da Supabase (nessun skeleton, nessuna attesa GAS)
  if (_sbReady) {
    sbListenMessages(partnerEmail);
    sbListenTyping(partnerEmail);
  } else {
    // Fallback GAS con skeleton
    await loadChatMessages(partnerEmail);
    startMessagePolling();
  }

  // Segna letti su GAS in background (fire & forget)
  if (GAS_URL) {
    fetch(`${GAS_URL}?action=mark_messages_read&email=${encodeURIComponent(currentUser.email)}&otherEmail=${encodeURIComponent(partnerEmail)}`).catch(()=>{});
  }
}

async function loadChatMessages(partnerEmail) {
  const messagesEl = document.getElementById('chatMessages');
  if (!messagesEl) return;
  if (!GAS_URL) { messagesEl.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted2);font-size:0.8rem;">Configura GAS_URL per la messaggistica reale.</div>'; return; }

  // Mostra subito dalla cache — zero latenza, nessun skeleton
  const cachedMsgs = _msgCache[partnerEmail.toLowerCase()];
  if (cachedMsgs && cachedMsgs.length > 0) {
    renderChatMessages(cachedMsgs, partnerEmail);
  }

  try {
    const resp = await fetch(`${GAS_URL}?action=get_messages&email1=${encodeURIComponent(currentUser.email)}&email2=${encodeURIComponent(partnerEmail)}&requesterEmail=${encodeURIComponent(currentUser.email)}`);
    const data = await resp.json();
    if (data.success && Array.isArray(data.messages)) {
      renderChatMessages(data.messages, partnerEmail);
      // Traccia l'ultimo messaggio per il polling
      if (data.messages.length > 0) {
        const last = data.messages[data.messages.length - 1];
        _msgLastSeen[partnerEmail] = last.id;
      }
    } else {
      renderChatMessages([], partnerEmail);
    }
  } catch(e) {
    messagesEl.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted2);font-size:0.8rem;">Errore caricamento messaggi.</div>';
    console.warn('[Messages] load error:', e.message);

}

/* ── Renderizza i messaggi nella chat — storico completo ── */
function renderChatMessages(messages, partnerEmail) {
  const messagesEl = document.getElementById('chatMessages');
  if (!messagesEl) return;
  const partnerInfo = getPartnerInfo(partnerEmail);

  if (messages.length === 0) {
    messagesEl.innerHTML = `<div style="text-align:center;padding:3rem 1rem;color:var(--muted2);font-size:0.8rem;line-height:1.8;">Nessun messaggio ancora.<br>Inizia la conversazione!</div>`;
    return;
  }

  let html = '';
  let lastTs = 0;
  let lastSenderEmail = '';
  const partnerRole = partnerInfo.role === 'team';
  // FIX data intelligente: mostra separatore solo se gap > 4 ore dal messaggio precedente
  const DATE_GAP_MS = 4 * 60 * 60 * 1000;

  messages.forEach((msg, idx) => {
    const isSent = msg.from.toLowerCase() === currentUser.email.toLowerCase();
    const senderEmail = msg.from.toLowerCase();
    const msgTs = new Date(msg.ts).getTime();
    const gap = msgTs - lastTs;
    const showDateDivider = idx === 0 || gap > DATE_GAP_MS;
    const isNewSender = senderEmail !== lastSenderEmail || showDateDivider;

    if (showDateDivider) {
      const dateLabel = new Date(msg.ts).toLocaleDateString('it-IT', { weekday:'long', day:'2-digit', month:'long' });
      html += `<div class="chat-date-divider"><span>${dateLabel}</span></div>`;
    }

    const timeLabel = formatMsgTime(msg.ts);
    const avatarStyle = isSent
      ? 'color:var(--gold);border-color:var(--gold-dim);'
      : (partnerRole ? 'color:var(--gold);border-color:var(--gold-dim);' : '');
    const avatarInitial = isSent ? currentUser.initial : partnerInfo.initial;
    const avatarVisible = isNewSender ? '' : 'visibility:hidden;';

    // Render media se presente
    const mediaHtml = msg.media_url ? renderMediaBubble(msg.media_url, msg.media_type) : '';

    html += `
      <div class="msg ${isSent ? 'sent' : 'received'}">
        ${!isSent ? `<div class="msg-avatar" style="${avatarStyle}${avatarVisible}">${avatarInitial}</div>` : ''}
        <div class="msg-bubble-wrap">
          ${mediaHtml}
          ${msg.text ? `<div class="msg-bubble">${escapeHtml(msg.text)}</div>` : ''}
          <div class="msg-time">${timeLabel}</div>
        </div>
        ${isSent ? `<div class="msg-avatar" style="${avatarStyle}${avatarVisible}">${avatarInitial}</div>` : ''}
      </div>`;

    lastTs = msgTs;
    lastSenderEmail = senderEmail;
  });

  messagesEl.innerHTML = html;
  // Salva timestamp dell'ultimo messaggio per la logica del separatore data in appendMessageToChat
  if (messages.length > 0) {
    messagesEl.dataset.lastMsgTs = new Date(messages[messages.length-1].ts).getTime();
    // Aggiorna cache in memoria (se non già aggiornata da sbListenMessages)
    if (currentConvPartnerEmail) {
      const cacheKey = currentConvPartnerEmail.toLowerCase();
      if (!_msgCache[cacheKey] || _msgCache[cacheKey].length <= messages.length) {
        _msgCache[cacheKey] = messages;
      }
    }
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════

let _epCurrentCat = 'recent';

function epInit() {
  // se recenti vuoti, mostra smileys di default
  if (_epRecents.length === 0) {
    _epCurrentCat = 'smileys';
    document.querySelector('.ep-cat[data-cat="smileys"]')?.classList.add('active');
    document.querySelector('.ep-cat[data-cat="recent"]')?.classList.remove('active');
  }
  epShowCat(_epCurrentCat, document.querySelector(`.ep-cat[data-cat="${_epCurrentCat}"]`));
}

function epShowCat(cat, btnEl) {
  _epCurrentCat = cat;
  document.querySelectorAll('.ep-cat').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  const label = document.getElementById('epCatLabel');
  if (label) label.textContent = EP_CAT_LABELS[cat] || cat;
  const emojis = cat === 'recent' ? _epRecents : (EP_DATA[cat] || []);
  epRenderGrid(emojis, cat === 'recent' && emojis.length === 0 ? 'Nessuna emoji usata di recente' : null);
  document.getElementById('epSearchInput').value = '';
}

function epRenderGrid(emojis, emptyMsg) {
  const grid = document.getElementById('epGrid');
  if (!grid) return;
  if (emptyMsg) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:1.5rem 0.5rem;text-align:center;font-size:0.72rem;color:rgba(245,245,245,0.3);">${emptyMsg}</div>`;
    return;
  }
  grid.innerHTML = emojis.map(em =>
    `<button class="ep-emoji" onclick="epSelect('${em.replace(/'/g,"\\'")}')" title="${em}">${em}</button>`
  ).join('');
}

function epSelect(emoji) {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const pos = input.selectionStart ?? input.value.length;
  input.value = input.value.slice(0, pos) + emoji + input.value.slice(pos);
  input.focus();
  input.selectionStart = input.selectionEnd = pos + emoji.length;
  // Aggiorna recenti
  _epRecents = [emoji, ..._epRecents.filter(e => e !== emoji)].slice(0, 24);
  try { localStorage.setItem('lh360_ep_recents', JSON.stringify(_epRecents)); } catch(_e) {}
  document.getElementById('emojiPickerWrap')?.classList.remove('open');
}
