<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LuxHaven360 — Reindirizzamento...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #c8b87a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .redirect-box { text-align: center; animation: fadeIn 0.4s ease forwards; }
        .redirect-logo { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.15em; color: #c8b87a; margin-bottom: 1.5rem; }
        .redirect-msg { font-size: 0.75rem; letter-spacing: 0.1em; color: rgba(200,184,122,0.5); text-transform: uppercase; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="redirect-box">
        <div class="redirect-logo">LuxHaven360</div>
        <div class="redirect-msg">Reindirizzamento in corso...</div>
    </div>
    <script>
    /**
     * ══════════════════════════════════════════════════════
     * LuxHaven360 — 404 Language-Prefix Redirect Handler
     * ══════════════════════════════════════════════════════
     *
     * FLUSSO completo:
     *  1. Utente clicca un link con prefisso lingua:
     *     luxhaven360.com/it/product-details/cart.html
     *  2. GitHub Pages non trova il file fisico → questo 404.html
     *  3. Questo script estrae la lingua dal path (/it/) e la salva
     *     in localStorage (lh360_lang).
     *  4. Fa redirect con location.replace() al file reale senza prefisso:
     *     luxhaven360.com/product-details/cart.html
     *  5. La pagina reale carica i18n.js / i18n-pdp.js / script inline
     *     che leggono lh360_lang da localStorage e riapplicano il prefisso
     *     cosmeticamente via history.replaceState():
     *     luxhaven360.com/it/product-details/cart.html  ✅
     */
    (function () {
        var SUPPORTED = ['it', 'en', 'fr', 'de', 'es'];
        var loc       = window.location;
        var pathname  = loc.pathname;

        // Estrae /{lang}/ dal path → es. /it/product-details/cart.html
        var match = pathname.match(/^\/(it|en|fr|de|es)(\/(.*))?$/);

        if (match) {
            var lang    = match[1];         // 'it'
            var subPath = match[3] || '';   // 'product-details/cart.html'

            // Salva lingua in localStorage — verrà riletta dall'i18n della pagina di destinazione
            try { localStorage.setItem('lh360_lang', lang); } catch (e) {}

            // Costruisci URL reale (senza prefisso lingua) e fai redirect senza lasciare traccia in history
            var realPath = subPath ? ('/' + subPath) : '/';
            var target   = loc.origin + realPath + loc.search + loc.hash;

            // Redirect istantaneo (no delay: evita race condition con Service Worker)
            loc.replace(target);

        } else {
            // URL senza prefisso lingua non trovato → home
            loc.replace(loc.origin + '/');
        }
    })();
    </script>
</body>
</html>
