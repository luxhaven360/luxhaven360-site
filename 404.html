<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LuxHaven360 — Reindirizzamento...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #c8b87a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .redirect-box {
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.1s forwards;
        }
        .redirect-logo {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: #c8b87a;
            margin-bottom: 1.5rem;
        }
        .redirect-msg {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: rgba(200, 184, 122, 0.5);
            text-transform: uppercase;
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="redirect-box">
        <div class="redirect-logo">LuxHaven360</div>
        <div class="redirect-msg">Reindirizzamento in corso...</div>
    </div>

    <script>
    /**
     * GitHub Pages — Language Prefix Redirect Handler
     *
     * Problema: i file fisici sono alla radice (es. luxhaven360.com/product-details/cart.html)
     * ma i link vengono aperti con prefisso lingua (es. /it/product-details/cart.html) → 404.
     *
     * Soluzione:
     *  1. Salva la lingua estratta dal path in localStorage.
     *  2. Reindirizza all'URL reale senza prefisso lingua.
     *  3. Il file di destinazione carica i18n.js che riapplica il prefisso cosmeticamente.
     */
    (function() {
        var SUPPORTED = ['it', 'en', 'fr', 'de', 'es'];
        var loc = window.location;
        var pathname = loc.pathname;

        // Estrai il prefisso lingua dal path: /it/product-details/... → ['it', 'product-details/...']
        var match = pathname.match(/^\/(it|en|fr|de|es)(\/(.*))?$/);

        if (match) {
            var lang    = match[1];
            var subPath = match[3] || '';  // Tutto dopo il prefisso lingua

            // Salva la lingua in localStorage — i18n.js la rileverà alla prossima pagina
            try { localStorage.setItem('lh360_lang', lang); } catch(e) {}

            // Costruisci l'URL reale (senza prefisso lingua)
            var realPath = subPath ? ('/' + subPath) : '/';
            var target   = loc.origin + realPath + loc.search + loc.hash;

            // Reindirizza immediatamente senza aggiungere la 404 alla cronologia
            loc.replace(target);

        } else {
            // URL senza prefisso lingua ma non trovato → torna alla home
            try { localStorage.removeItem('lh360_lang'); } catch(e) {}
            loc.replace(loc.origin + '/');
        }
    })();
    </script>
</body>
</html>
